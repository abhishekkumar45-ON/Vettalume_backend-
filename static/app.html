/* ======================================================================
   PILLAR 2 & 3 : SECTIONAL MOCKS, FULL MOCKS, + TOPIC PRACTICE
   ====================================================================== */
const SMOCK_N=6, FMOCK_N=8, SMOCK_Q=12, FMOCK_QPS=5, SMOCK_MIN=40;
const MOCKR={};        // mock results : smKey/fmKey -> result
const TPRAC={};        // topic-practice results : topKey -> result
const recDismiss={};   // exam -> {tid:true} manually cleared recs
const seeded={};       // exam -> bool

function hashStr(s){let h=2166136261>>>0;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function seededRand(seed){let s=hashStr(String(seed))||123456789;return ()=>{s^=s<<13;s^=s>>>17;s^=s<<5;s>>>=0;return s/4294967296;};}
const smKey=(sec,n)=>EXAM+"|S|"+sec+"|"+n;
const fmKey=n=>EXAM+"|F|"+n;
const allSections=()=>Object.keys(TREE[EXAM]||{});
function sectionPairs(sec){const out=[];for(const cl of sectionTree(sec))for(const t of cl.topics)for(const s of t.subs)out.push({tid:t.id,topic:t.name,sub:s});return out;}
const emh=byD=>({easy:{t:byD[1].t+byD[2].t,c:byD[1].c+byD[2].c,time:byD[1].time+byD[2].time},
                 med:{t:byD[3].t,c:byD[3].c,time:byD[3].time},
                 hard:{t:byD[4].t+byD[5].t,c:byD[4].c+byD[5].c,time:byD[4].time+byD[5].time}});

/* ---- build a result object from a per-question list ---- */
function mockResultFromPerQ(perQ,kind,sections){
  const answered=perQ.filter(q=>!q.skipped), correct=perQ.filter(q=>q.correct).length, total=perQ.length;
  const acc=answered.length?correct/answered.length:0, timeSec=perQ.reduce((a,q)=>a+(q.time||0),0);
  const byTopic={}; perQ.forEach(q=>{const k=q.tid;if(!byTopic[k])byTopic[k]={tid:q.tid,topic:q.topic,section:q.section,t:0,c:0,time:0};byTopic[k].t++;byTopic[k].c+=q.correct?1:0;byTopic[k].time+=q.time||0;});
  const byD={};[1,2,3,4,5].forEach(d=>byD[d]={t:0,c:0,time:0});perQ.forEach(q=>{byD[q.d].t++;byD[q.d].c+=q.correct?1:0;byD[q.d].time+=q.time||0;});
  let bySection=null;
  if(kind==="F"){bySection={};(sections||[]).forEach(s=>bySection[s]={t:0,c:0,time:0});perQ.forEach(q=>{const s=q.section;if(!bySection[s])bySection[s]={t:0,c:0,time:0};bySection[s].t++;bySection[s].c+=q.correct?1:0;bySection[s].time+=q.time||0;});}
  const pct=Math.max(20,Math.min(99,Math.round(acc*68+18)));
  return {attempted:true,kind,perQ,total,correct,answered:answered.length,acc,timeSec,byTopic,byD,bySection,
          skipped:perQ.filter(q=>q.skipped).length,guessed:perQ.filter(q=>q.guessed).length,score:correct,pct,date:Date.now()};
}
/* ---- synthetic per-question history (so dashboards/trends have data) ---- */
function synthPerQ(seed,pairs,count,ability,improve,sectionOf){
  const rnd=seededRand(seed),perQ=[];
  for(let i=0;i<count;i++){
    const p=pairs[Math.floor(rnd()*pairs.length)], d=1+Math.floor(rnd()*5);
    const base=(ability+improve)/100, tb=((hashStr(p.tid)%30)-15)/100;
    const pc=Math.max(0.05,Math.min(0.96,base+tb-(d-3)*0.09));
    let correct=rnd()<pc; const bench=BENCH[d], time=Math.round(bench*(0.55+rnd()*1.0));
    const skipped=(!correct&&rnd()<0.10); if(skipped)correct=false;
    const guessed=(correct&&d>=4&&rnd()<0.28);
    perQ.push({tid:p.tid,topic:p.topic,sub:p.sub.name,d,correct,time:skipped?0:time,bench,skipped,guessed,section:sectionOf?sectionOf(p):undefined});
  }
  return perQ;
}
function seedHistory(){
  if(seeded[EXAM])return; seeded[EXAM]=true;
  const ex=EXAMS[EXAM];
  ex.sections.forEach(s=>{const k=Math.min(4,SMOCK_N-1);
    for(let n=1;n<=k;n++){const pq=synthPerQ("seed|"+smKey(s.key,n),sectionPairs(s.key),SMOCK_Q,s.ability-6,n*2.2);MOCKR[smKey(s.key,n)]=mockResultFromPerQ(pq,"S");}});
  const fSeed=Math.max(1,Math.min(ex.done,FMOCK_N-1)),secs=allSections();
  for(let n=1;n<=fSeed;n++){let pq=[];secs.forEach(sc=>{const ab=(ex.sections.find(x=>x.key===sc)||{}).ability||60;pq=pq.concat(synthPerQ("seed|"+fmKey(n)+"|"+sc,sectionPairs(sc),FMOCK_QPS,ab-6,n*2.0,()=>sc));});MOCKR[fmKey(n)]=mockResultFromPerQ(pq,"F",secs);}
}

/* ---- aggregation + recommendations ---- */
function attemptedSectional(sec){const a=[];for(let n=1;n<=SMOCK_N;n++){const r=MOCKR[smKey(sec,n)];if(r)a.push({n,r});}return a;}
function attemptedFull(){const a=[];for(let n=1;n<=FMOCK_N;n++){const r=MOCKR[fmKey(n)];if(r)a.push({n,r});}return a;}
function aggTopicAcc(att){const m={};att.forEach(({r})=>Object.values(r.byTopic).forEach(tp=>{if(!m[tp.tid])m[tp.tid]={tid:tp.tid,topic:tp.topic,section:tp.section,t:0,c:0};m[tp.tid].t+=tp.t;m[tp.tid].c+=tp.c;}));return Object.values(m).map(x=>({...x,acc:x.t?x.c/x.t:0}));}
function recList(att,fixedSec){
  const dis=recDismiss[EXAM]||{};
  return aggTopicAcc(att).filter(x=>x.t>=2).sort((a,b)=>a.acc-b.acc)
    .map(x=>({...x,sec:fixedSec||x.section}))
    .filter(x=>x.acc<0.6 && x.sec && topicMastery(x.sec,x.tid)<H && !dis[x.tid]).slice(0,5);
}
function bySubAgg(perQ){const m={};perQ.forEach(q=>{const k=q.subId||q.sub;if(!m[k])m[k]={sub:q.sub,t:0,c:0,time:0};m[k].t++;m[k].c+=q.correct?1:0;m[k].time+=q.time||0;});return Object.values(m).map(x=>({...x,acc:x.t?x.c/x.t:0}));}

function accBars(rows,color){
  if(!rows.length)return '<div style="color:var(--text-3);font-size:12.5px">No data yet.</div>';
  return `<div class="swlist">`+rows.map(r=>`<div class="swrow"><span class="nm">${r.lab}</span>
    <span class="smeter" style="width:120px;flex:none"><i style="width:${r.pct}%;background:${r.pct>=60?color:r.pct>=40?'#E0A84E':'#A8542B'}"></i></span>
    <span class="mv">${r.pct}%</span></div>`).join('')+`</div>`;
}
function timeList(rows){
  return `<div class="swlist">`+rows.map(r=>`<div class="swrow"><span class="nm">${r.lab}</span><span class="ssp"></span><span class="mv">${fmtT(r.t)}</span></div>`).join('')+`</div>`;
}
function mockInsights(r){
  const tops=Object.values(r.byTopic).filter(t=>t.t>=2),ins=[];
  const strong=tops.filter(t=>t.c/t.t>=0.75).sort((a,b)=>b.c/b.t-a.c/a.t)[0];
  const weak=tops.filter(t=>t.c/t.t<0.5).sort((a,b)=>a.c/a.t-b.c/b.t)[0];
  if(strong)ins.push(["good",strong.topic+" accuracy is "+Math.round(strong.c/strong.t*100)+"%."]);
  if(weak)ins.push(["warn",weak.topic+" accuracy is "+Math.round(weak.c/weak.t*100)+"% — a priority to revise."]);
  const h=emh(r.byD).hard; if(h.t){const avgH=h.time/h.t;if(avgH>BENCH[4]*1.2)ins.push(["warn","You spent more time than average on hard questions ("+fmtT(avgH)+" each)."]);}
  if(r.skipped)ins.push(["warn",r.skipped+" question"+(r.skipped>1?"s":"")+" skipped — work on pacing and selection."]);
  if(r.guessed)ins.push(["warn",r.guessed+" answer"+(r.guessed>1?"s":"")+" likely guessed (fast correct on hard items)."]);
  if(!ins.length)ins.push(["good","Balanced performance across topics and difficulty."]);
  return ins;
}
const reviewList=perQ=>{
  const real=perQ.filter(q=>q.stem);
  if(!real.length)return '<div style="color:var(--text-3);font-size:12.5px;padding:6px 0">Per-question review is shown for mocks you take in-app.</div>';
  return real.map((a,i)=>`<div class="rev-q" data-rev="${i}"><div class="rev-h">
    <span class="rev-mark ${a.skipped?'no':a.correct?'ok':'no'}">${a.skipped?'–':a.correct?'✓':'✗'}</span>
    <span class="rstem">Q${i+1}. ${a.stem}</span><span class="rt">${a.skipped?'skipped':fmtT(a.time)}</span><span class="chev">›</span></div>
    <div class="rev-body"><div class="ln">Your answer: <b>${a.skipped?'(skipped)':a.options[a.chosenIdx]}</b>${a.correct?'':` · Correct: <b style="color:#69B88C">${a.options[a.correctIdx]}</b>`}</div>
    <div class="ln">Topic <b>${a.topic}</b> · difficulty <b>d${a.d}</b></div><div class="sol">${a.sol}</div></div></div>`).join('');
};

/* ---- starting sessions ---- */
function startTopicPractice(sec,tid){
  const f=findTopic(sec,tid),subs=f.t.subs,per=Math.max(2,Math.min(4,Math.ceil(12/subs.length)));let qs=[];
  subs.forEach(sub=>{shuffle([2,3,3,4,5]).slice(0,per).forEach(d=>{const q=genQ(sub.qtype,d);q.topic=f.t.name;q.tid=tid;q.subId=sub.id;q.sub=sub.name;q.d=d;qs.push(q);});});
  shuffle(qs); qs=qs.slice(0,15);
  SESS={mode:"practice",sec,tid,sub:null,qs,idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined};
  go({v:"quiz"});
}
function startSectionalMock(sec,n){
  const pairs=sectionPairs(sec),rnd=seededRand("paper|"+smKey(sec,n));let qs=[];
  for(let i=0;i<SMOCK_Q;i++){const p=pairs[Math.floor(rnd()*pairs.length)],d=1+Math.floor(rnd()*5);const q=genQ(p.sub.qtype,d);q.topic=p.topic;q.tid=p.tid;q.subId=p.sub.id;q.sub=p.sub.name;q.d=d;qs.push(q);}
  SESS={mode:"smock",sec,n,qs,idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined,allot:SMOCK_MIN*60};
  go({v:"quiz"});
}
function startFullMock(n){
  const secs=allSections();let qs=[];
  secs.forEach(sc=>{const pairs=sectionPairs(sc),rnd=seededRand("paper|"+fmKey(n)+"|"+sc);for(let i=0;i<FMOCK_QPS;i++){const p=pairs[Math.floor(rnd()*pairs.length)],d=1+Math.floor(rnd()*5);const q=genQ(p.sub.qtype,d);q.topic=p.topic;q.tid=p.tid;q.subId=p.sub.id;q.sub=p.sub.name;q.section=sc;q.d=d;qs.push(q);}});
  SESS={mode:"fmock",n,sec:secs[0],qs,idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined,allot:secs.length*SMOCK_MIN*60};
  go({v:"quiz"});
}
/* ---- finalizers ---- */
function buildPerQ(S){return S.ans.map(a=>({tid:a.q.tid,topic:a.q.topic,sub:a.q.sub,subId:a.q.subId,section:a.q.section,d:a.d,correct:a.correct,time:a.time,bench:a.bench,skipped:!!a.skipped,
  guessed:(a.correct&&a.d>=4&&a.time<a.bench*0.45),stem:a.q.stem,options:a.q.options,chosenIdx:a.chosen,correctIdx:a.q.correct,sol:a.q.sol}));}
function finalizeFixed(){const m=SESS.mode;if(m==="learn")return finalizeLearn();if(m==="practice")return finalizeTopicPractice();if(m==="smock")return finalizeSectionalMock();if(m==="fmock")return finalizeFullMock();}
function finalizeTopicPractice(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  const S=SESS,perQ=buildPerQ(S);
  S.ans.forEach(a=>{if(a.skipped)return;const st=subState(S.sec,S.tid,a.q.subId);st.log.push({C:a.correct?1:0,d:a.d,ago:0});st.reviseTime+=a.time;recomputeSub(st);});
  const r=mockResultFromPerQ(perQ,"P");r.bySub=bySubAgg(perQ);TPRAC[topKey(S.sec,S.tid)]=r;
  const tk=topKey(S.sec,S.tid);if(!THIST[tk])THIST[tk]=[0];THIST[tk].push(topicMastery(S.sec,S.tid));
  go({v:"tpanalysis",sec:S.sec,tid:S.tid});
}
function finalizeSectionalMock(){if(timerInt){clearInterval(timerInt);timerInt=null;}const S=SESS;MOCKR[smKey(S.sec,S.n)]=mockResultFromPerQ(buildPerQ(S),"S");go({v:"smAnalysis",sec:S.sec,n:S.n});}
function finalizeFullMock(){if(timerInt){clearInterval(timerInt);timerInt=null;}const S=SESS;MOCKR[fmKey(S.n)]=mockResultFromPerQ(buildPerQ(S),"F",allSections());go({v:"fmAnalysis",n:S.n});}

    <div class="dash-grid">
      <div class="dbox"><h4>Easy / Medium / Hard performance</h4>${accBars(emhRows,c)}
        <div class="splitkey" style="margin-top:10px"><span>avg time E <b>${e.easy.t?fmtT(e.easy.time/e.easy.t):'—'}</b></span><span>M <b>${e.med.t?fmtT(e.med.time/e.med.t):'—'}</b></span><span>H <b>${e.hard.t?fmtT(e.hard.time/e.hard.t):'—'}</b></span></div></div>
      <div class="dbox"><h4>Time spent by topic</h4>${timeList(tlist.map(t=>({lab:t.topic,t:t.time})))}</div>
      <div class="dbox"><h4>Strong topics</h4><div class="swlist">${strong.length?strong.map(t=>`<div class="swrow"><span class="sd" style="background:#69B88C"></span><span class="nm">${t.topic}</span><span class="mv">${Math.round(t.c/t.t*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
      <div class="dbox"><h4>Weak topics</h4><div class="swlist">${weak.length?weak.map(t=>`<div class="swrow"><span class="sd" style="background:#D08A52"></span><span class="nm">${t.topic}</span><span class="mv">${Math.round(t.c/t.t*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
      <div class="dbox"><h4>Skipped &amp; guessed</h4><div class="swlist">
        <div class="swrow"><span class="nm">Questions skipped</span><span class="ssp"></span><span class="mv">${r.skipped}</span></div>
        <div class="swrow"><span class="nm">Likely guessed</span><span class="ssp"></span><span class="mv">${r.guessed}</span></div>
        <div class="swrow"><span class="nm">Avg time / question</span><span class="ssp"></span><span class="mv">${fmtT(r.timeSec/r.total)}</span></div></div></div>
      <div class="dbox"><h4>Common mistakes &amp; insights</h4><div class="rec-list">${mockInsights(r).map(([t,x])=>`<div class="rec ${t}"><span class="ri">${t==='good'?'✓':'!'}</span><span>${x}</span></div>`).join('')}</div></div>
    </div>
    <div class="head" style="margin:8px 0 12px"><div><div class="idx"><span class="ln"></span>Question review</div></div></div>
    ${reviewList(r.perQ)}
  </div>`;
}

/* ====================== VIEW : FULL MOCK AREA ====================== */
function viewFmArea(){
  seedHistory();
  const ex=EXAMS[EXAM],att=attemptedFull(),secs=allSections();
  const latest=att.length?att[att.length-1].r:null, best=att.reduce((m,a)=>Math.max(m,a.r.pct),0);
  const scoreS=att.map(a=>a.r.pct), accS=att.map(a=>Math.round(a.r.acc*100)), timeS=att.map(a=>Math.round(a.r.timeSec/a.r.total));
  const avgSyll=Math.round(ex.sections.reduce((s,x)=>s+x.syll,0)/ex.sections.length);
  const readiness=latest?Math.round(0.6*latest.pct+0.4*avgSyll):0;
  const tAgg=aggTopicAcc(att).filter(x=>x.t>=2).sort((a,b)=>b.acc-a.acc);
  const strong=tAgg.slice(0,3), weak=[...tAgg].reverse().slice(0,3);
  const secRows=latest?secs.map(s=>({lab:s,pct:latest.bySection[s]&&latest.bySection[s].t?Math.round(latest.bySection[s].c/latest.bySection[s].t*100):0})):[];
  const recs=recList(att,null);
  let nextIdx=null;for(let n=1;n<=FMOCK_N;n++){if(!MOCKR[fmKey(n)]){nextIdx=n;break;}}
  let list="";
  for(let n=1;n<=FMOCK_N;n++){const r=MOCKR[fmKey(n)];
    list+=`<div class="sub-row"><span class="sdot" style="background:${r?'var(--brand)':'#454B55'}"></span><span class="sn">Full Mock ${n}</span>
      ${r?`<span class="badge done">${r.pct}ile · ${Math.round(r.acc*100)}%</span>`:n===nextIdx?'<span class="badge rec">Start next</span>':'<span class="badge lock">🔒 locked</span>'}
      <span class="ssp"></span><span class="sb">${r?`<button class="tbtn" data-go="fmAnalysis" data-n="${n}">View analysis</button>`
        :n===nextIdx?`<button class="tbtn tl" data-startfull="1" data-n="${n}">Start full mock</button>`:`<button class="tbtn disabled" disabled>Locked</button>`}</span></div>`;
  }
  const rdColor=readiness>=70?'#69B88C':readiness>=50?'#ECD9A6':'#D08A52';
  const recBox=`<div class="dbox full"><h4>Recommended learning path — priority order</h4>
    <div class="rec-actions"><span style="font-size:12px;color:var(--text-3)">Ordered by impact across all mocks, connecting mocks → learning.</span><button class="refresh-btn" data-refreshrecs="1">↻ Refresh</button></div>
    <div class="rec-list">${recs.length?recs.map((x,i)=>`<div class="rec warn"><span class="ri">${i+1}</span><span>${x.topic} <span style="color:var(--text-3)">(${x.sec})</span> — ${Math.round(x.acc*100)}% across mocks</span>
      <button class="gp" data-go="topic" data-sec="${x.sec}" data-tid="${x.tid}">Go practice →</button></div>`).join('')
      :'<div class="rec good"><span class="ri">✓</span><span>No outstanding weak topics — keep mocking to hold readiness.</span></div>'}</div></div>`;
  return `<div class="wrap pg"><button class="back" data-go="home"><span class="a">←</span> Back to home</button>
    <div class="sk">${EXAM} · full-length mocks</div><h2>Full mocks</h2>
    <div class="full">Each mock spans all sections (${secs.join(", ")}). The dashboard aggregates every attempt; scores and analyses are preserved forever.</div></div>
  <div class="wrap" style="padding-bottom:8px">
    <div class="bigstat">
      <div class="bs"><div class="v" style="color:var(--brand)">${att.length}<small>/${FMOCK_N}</small></div><div class="k">mocks attempted</div></div>
      <div class="bs"><div class="v">${latest?latest.pct:'—'}<small>ile</small></div><div class="k">latest percentile</div></div>
      <div class="bs"><div class="v">${best||'—'}<small>ile</small></div><div class="k">best percentile</div></div>
      <div class="bs"><div class="readygauge"><span class="rv" style="color:${rdColor}">${readiness}%</span><span class="rl">predicted readiness</span></div></div>
    </div>
    <div class="dash-grid">
      <div class="dbox"><h4>Score progression</h4><div class="plot">${lineSVG(scoreS.length>1?scoreS:[scoreS[0]||0,scoreS[0]||0],"#ECD9A6",{ymin:0,ymax:100})}</div></div>
      <div class="dbox"><h4>Accuracy trend</h4><div class="plot">${lineSVG(accS.length>1?accS:[accS[0]||0,accS[0]||0],"#56B6AE",{ymin:0,ymax:100})}</div></div>
      <div class="dbox"><h4>Time management (avg sec / question)</h4><div class="plot">${lineSVG(timeS.length>1?timeS:[timeS[0]||0,timeS[0]||0],"#E0A84E",{ymin:0})}</div></div>
      <div class="dbox"><h4>Section-wise (latest mock)</h4>${accBars(secRows,"#ECD9A6")}</div>
      <div class="dbox"><h4>Strongest topics</h4><div class="swlist">${strong.length?strong.map(x=>`<div class="swrow"><span class="sd" style="background:#69B88C"></span><span class="nm">${x.topic}</span><span class="mv">${Math.round(x.acc*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
      <div class="dbox"><h4>Weakest topics</h4><div class="swlist">${weak.length?weak.map(x=>`<div class="swrow"><span class="sd" style="background:#D08A52"></span><span class="nm">${x.topic}</span><span class="mv">${Math.round(x.acc*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
    </div>
    ${recBox}
    <div class="head" style="margin:14px 0 12px"><div><div class="idx"><span class="ln"></span>Mocks</div></div></div>
    <div class="cluster">${list}</div>
  </div>`;
}

/* ====================== VIEW : FULL MOCK ANALYSIS ====================== */
function viewFmAnalysis(n){
  const r=MOCKR[fmKey(n)],secs=allSections();
  if(!r)return `<div class="wrap pg"><button class="back" data-go="fmArea"><span class="a">←</span> Full mocks</button><h2>Full Mock ${n}</h2><p class="full">Not attempted yet.</p></div>`;
  const secAcc=secs.map(s=>({lab:s,pct:r.bySection[s]&&r.bySection[s].t?Math.round(r.bySection[s].c/r.bySection[s].t*100):0}));
  const totT=secs.reduce((a,s)=>a+(r.bySection[s]?r.bySection[s].time:0),0)||1;
  const tAgg=Object.values(r.byTopic).filter(t=>t.t>=1).map(t=>({lab:t.topic,pct:Math.round(t.c/t.t*100)})).sort((a,b)=>b.pct-a.pct);
  const dRows=[1,2,3,4,5].map(d=>({lab:"d"+d,pct:r.byD[d].t?Math.round(r.byD[d].c/r.byD[d].t*100):0}));
  const secStrong=[...secAcc].sort((a,b)=>b.pct-a.pct)[0], secWeak=[...secAcc].sort((a,b)=>a.pct-b.pct)[0];
  return `<div class="wrap pg"><button class="back" data-go="fmArea"><span class="a">←</span> Full mocks</button>
    <div class="sk">${EXAM} · full mock analysis</div><h2>Full Mock ${n}</h2>
    <div class="full">Overall and section-by-section, preserved permanently.</div></div>
  <div class="wrap" style="padding-bottom:8px">
    <div class="bigstat">
      <div class="bs"><div class="v" style="color:var(--brand)">${r.correct}<small>/${r.total}</small></div><div class="k">overall score</div></div>
      <div class="bs"><div class="v">${Math.round(r.acc*100)}<small>%</small></div><div class="k">accuracy</div></div>
      <div class="bs"><div class="v" style="color:var(--brand)">${r.pct}<small>ile</small></div><div class="k">percentile</div></div>
      <div class="bs"><div class="v">${fmtT(r.timeSec)}</div><div class="k">total time</div></div>
    </div>
    <div class="dash-grid">
      <div class="dbox"><h4>Section-wise scores</h4>${accBars(secAcc,"#ECD9A6")}</div>
      <div class="dbox"><h4>Time allocation across sections</h4>
        <div class="splitbar" style="margin-top:4px">${secs.map((s,i)=>{const w=(r.bySection[s]?r.bySection[s].time:0)/totT*100;return `<div class="splitseg" style="width:${w}%;background:${[secColor(s)][0]}"></div>`;}).join('')}</div>
        <div class="splitkey" style="flex-wrap:wrap">${secs.map(s=>`<span><i class="sw" style="background:${secColor(s)}"></i>${s} <b>${fmtT(r.bySection[s]?r.bySection[s].time:0)}</b></span>`).join('')}</div></div>
      <div class="dbox"><h4>Difficulty-wise breakdown</h4>${accBars(dRows,"#ECD9A6")}</div>
      <div class="dbox"><h4>Strong &amp; weak sections</h4><div class="swlist">
        <div class="swrow"><span class="sd" style="background:#69B88C"></span><span class="nm">${secStrong.lab}</span><span class="mv">${secStrong.pct}%</span></div>
        <div class="swrow"><span class="sd" style="background:#D08A52"></span><span class="nm">${secWeak.lab}</span><span class="mv">${secWeak.pct}%</span></div></div></div>
      <div class="dbox full"><h4>Topic-wise breakdown</h4>${accBars(tAgg,"#ECD9A6")}</div>
    </div>
    <div class="head" style="margin:8px 0 12px"><div><div class="idx"><span class="ln"></span>Question review</div></div></div>
    ${reviewList(r.perQ)}
  </div>`;
}

/* ====================== VIEW : TOPIC PRACTICE ANALYSIS ====================== */
function viewTopicPracticeAnalysis(sec,tid){
  const f=findTopic(sec,tid),c=secColor(sec),r=TPRAC[topKey(sec,tid)];
  if(!r)return `<div class="wrap pg"><button class="back" data-go="topic" data-sec="${sec}" data-tid="${tid}"><span class="a">←</span> ${f.t.name}</button><h2>${f.t.name} · Practice</h2><p class="full">No practice attempt yet — use “Practice questions” on the topic page.</p></div>`;
  const e=emh(r.byD), subRows=(r.bySub||[]).sort((a,b)=>b.acc-a.acc);
  const dRows=[1,2,3,4,5].map(d=>({lab:"d"+d,pct:r.byD[d].t?Math.round(r.byD[d].c/r.byD[d].t*100):0})).filter((x,i)=>r.byD[i+1].t);
  const emhRows=[{lab:"Easy (d1–2)",g:e.easy},{lab:"Medium (d3)",g:e.med},{lab:"Hard (d4–5)",g:e.hard}].filter(x=>x.g.t).map(x=>({lab:x.lab,pct:Math.round(x.g.c/x.g.t*100)}));
  const strong=subRows.filter(s=>s.t>=1&&s.acc>=0.7).slice(0,3), weak=[...subRows].filter(s=>s.acc<0.6).reverse().slice(0,3);
  const recRevise=weak.map(w=>w.sub);
  return `<div class="wrap pg"><button class="back" data-go="topic" data-sec="${sec}" data-tid="${tid}"><span class="a">←</span> ${f.t.name}</button>
    <div class="sk">${EXAM} · ${sec} · topic practice analysis</div><h2>${f.t.name} — Practice</h2>
    <div class="full">A topic-level practice test across every subtopic. This analysis stays available whenever you revisit the topic.</div></div>
  <div class="wrap" style="padding-bottom:8px">
    <div class="bigstat">
      <div class="bs"><div class="v" style="color:${c}">${r.correct}<small>/${r.total}</small></div><div class="k">score</div></div>
      <div class="bs"><div class="v">${Math.round(r.acc*100)}<small>%</small></div><div class="k">accuracy</div></div>
      <div class="bs"><div class="v">${fmtT(r.timeSec/r.total)}</div><div class="k">avg time / question</div></div>
      <div class="bs"><div class="v" style="color:${masteryLabel(topicMastery(sec,tid))[1]}">${topicMastery(sec,tid).toFixed(2)}</div><div class="k">topic mastery now</div></div>
    </div>
    <div class="dash-grid">
      <div class="dbox"><h4>Accuracy by subtopic</h4>${accBars(subRows.map(s=>({lab:s.sub,pct:Math.round(s.acc*100)})),c)}</div>
      <div class="dbox"><h4>Accuracy by difficulty</h4>${accBars(dRows,c)}</div>
      <div class="dbox"><h4>Time on easy / medium / hard</h4>
        <div class="splitbar" style="margin-top:4px"><div class="splitseg" style="width:${e.easy.time/(r.timeSec||1)*100}%;background:#69B88C"></div><div class="splitseg" style="width:${e.med.time/(r.timeSec||1)*100}%;background:#E0A84E"></div><div class="splitseg" style="width:${e.hard.time/(r.timeSec||1)*100}%;background:#A8542B"></div></div>
        <div class="splitkey"><span>Easy <b>${fmtT(e.easy.time)}</b></span><span>Med <b>${fmtT(e.med.time)}</b></span><span>Hard <b>${fmtT(e.hard.time)}</b></span></div></div>
      <div class="dbox"><h4>Strongest subtopics</h4><div class="swlist">${strong.length?strong.map(s=>`<div class="swrow"><span class="sd" style="background:#69B88C"></span><span class="nm">${s.sub}</span><span class="mv">${Math.round(s.acc*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
      <div class="dbox"><h4>Weakest subtopics</h4><div class="swlist">${weak.length?weak.map(s=>`<div class="swrow"><span class="sd" style="background:#D08A52"></span><span class="nm">${s.sub}</span><span class="mv">${Math.round(s.acc*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">—</div>'}</div></div>
      <div class="dbox"><h4>Common mistakes &amp; concepts to revise</h4><div class="rec-list">${mockInsights(r).slice(0,2).map(([t,x])=>`<div class="rec ${t}"><span class="ri">${t==='good'?'✓':'!'}</span><span>${x}</span></div>`).join('')}
        ${recRevise.length?`<div class="rec warn"><span class="ri">→</span><span>Revise: ${recRevise.join(", ")}.</span></div>`:''}</div></div>
    </div>
    <div class="head" style="margin:8px 0 12px"><div><div class="idx"><span class="ln"></span>Question review</div></div></div>
    ${reviewList(r.perQ)}
  </div>`;
}

</script>
