<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vettalume — Learn, Practice &amp; Mocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..400&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== FRIEND BASE (verbatim) ===== */
:root{
  --ink:#090B0F;
  --ink-2:#0C0F14;
  --panel:#12151C;
  --panel-2:#161A22;
  --panel-3:#1B202A;
  --line:#262B35;
  --line-soft:#1C212B;
  --text:#F3F0E9;
  --text-2:#9BA1AD;
  --text-3:#666C77;
  --text-4:#454B55;

  --brand:#ECD9A6;        /* champagne — the lume */
  --varc:#E0A84E;         /* amber  */
  --dilr:#56B6AE;         /* teal   */
  --qa:#A18FE0;           /* violet */

  --ok:#69B88C;
  --warn:#D08A52;

  --maxw:1180px;
  --r:14px;
  --r-sm:10px;

  --f-display:"Fraunces",Georgia,serif;
  --f-body:"Hanken Grotesk",system-ui,sans-serif;
  --f-mono:"JetBrains Mono",ui-monospace,monospace;
}

*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:
    radial-gradient(1100px 620px at 78% -8%, rgba(224,168,78,0.07), transparent 60%),
    radial-gradient(900px 520px at 8% 4%, rgba(86,182,174,0.05), transparent 58%),
    var(--ink);
  color:var(--text);
  font-family:var(--f-body);
  font-size:15px;
  line-height:1.55;
  letter-spacing:0.1px;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(236,217,166,0.22)}
a{color:inherit}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--brand);outline-offset:3px;border-radius:6px}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}

/* ---------- header ---------- */
header.bar{
  position:sticky;top:0;z-index:40;
  background:linear-gradient(180deg, rgba(9,11,15,0.92), rgba(9,11,15,0.66) 70%, transparent);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line-soft);
}
.bar-in{display:flex;align-items:center;gap:22px;height:68px}
.mark{display:flex;align-items:baseline;gap:9px;font-family:var(--f-display);
  font-weight:400;font-size:23px;letter-spacing:0.3px;color:var(--text);
  font-optical-sizing:auto;}
.mark .dot{width:7px;height:7px;border-radius:50%;background:var(--brand);
  box-shadow:0 0 14px 2px rgba(236,217,166,0.7);align-self:center;margin-right:1px}
.mark .lume{color:var(--brand);font-style:italic;font-weight:300}
.spacer{flex:1}

.seg{display:flex;border:1px solid var(--line);border-radius:999px;padding:3px;background:rgba(255,255,255,0.012)}
.seg button{border:0;background:transparent;color:var(--text-2);
  font-size:12.5px;font-weight:600;letter-spacing:0.4px;padding:7px 15px;border-radius:999px;
  transition:color .2s,background .2s}
.seg button[aria-pressed="true"]{background:var(--panel-3);color:var(--text);
  box-shadow:inset 0 0 0 1px var(--line)}
.seg button:hover{color:var(--text)}

/* ---------- greeting ---------- */
.hello{padding:48px 0 8px}
.hello .eyebrow{font-family:var(--f-mono);font-size:11.5px;letter-spacing:2.4px;
  text-transform:uppercase;color:var(--text-3);margin-bottom:16px}
.hello h1{font-family:var(--f-display);font-optical-sizing:auto;
  font-weight:330;font-size:clamp(30px,5vw,46px);line-height:1.07;margin:0;letter-spacing:-0.4px}
.hello h1 em{font-style:italic;font-weight:300;color:var(--brand)}
.hello .sub{color:var(--text-2);max-width:60ch;margin-top:14px;font-size:15.5px}

/* ---------- section scaffold ---------- */
section.block{padding:46px 0;border-top:1px solid var(--line-soft)}
section.block:first-of-type{border-top:0}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:26px;flex-wrap:wrap}
.head .idx{font-family:var(--f-mono);font-size:12px;letter-spacing:2px;color:var(--text-3);
  display:flex;align-items:center;gap:11px}
.head .idx .ln{width:30px;height:1px;background:var(--line)}
.head h2{font-family:var(--f-display);font-optical-sizing:auto;font-weight:380;
  font-size:clamp(22px,3vw,30px);margin:8px 0 0;letter-spacing:-0.2px}
.head .lede{color:var(--text-2);font-size:14px;max-width:46ch;text-align:right}

/* ---------- learning grid ---------- */
.learn{display:grid;grid-template-columns:repeat(3,minmax(0,1fr)) 1.32fr;gap:16px;align-items:stretch}

.card{background:linear-gradient(180deg,var(--panel),var(--ink-2));
  border:1px solid var(--line);border-radius:var(--r);position:relative;overflow:hidden}
.gcard{padding:20px 18px 22px;display:flex;flex-direction:column}
.gcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.gcard .nm{font-weight:700;font-size:15px;letter-spacing:0.3px}
.gcard .full{color:var(--text-3);font-size:11px;line-height:1.3;margin-top:3px;min-height:26px}
.gcard .chip{font-family:var(--f-mono);font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px}

.gauge{position:relative;width:158px;height:128px;margin:6px auto 2px}
.gauge svg{display:block;width:158px;height:158px;position:absolute;top:-6px;left:0}
.gauge .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  top:-6px;padding-bottom:18px;pointer-events:none}
.gauge .val{font-family:var(--f-display);font-optical-sizing:auto;font-weight:340;font-size:46px;line-height:1;
  letter-spacing:-1px}
.gauge .ab{font-family:var(--f-mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;
  color:var(--text-3);margin-top:5px}

.gstats{margin-top:auto;padding-top:14px;border-top:1px solid var(--line-soft);display:flex;flex-direction:column;gap:11px}
.gstat{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--text-2)}
.gstat b{font-family:var(--f-mono);font-weight:500;color:var(--text);font-size:12.5px}
.syll{height:4px;border-radius:99px;background:var(--panel-3);overflow:hidden;margin-top:2px}
.syll i{display:block;height:100%;border-radius:99px}

/* progression chart card */
.chart-card{padding:20px 22px 16px;display:flex;flex-direction:column;min-width:0}
.chart-card .chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.chart-card .ctitle{font-weight:600;font-size:14px;letter-spacing:0.2px}
.chart-card .csub{color:var(--text-3);font-size:11.5px;font-family:var(--f-mono);letter-spacing:0.4px}
.legend{display:flex;gap:6px;margin:10px 0 4px;flex-wrap:wrap}
.legend button{display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:transparent;
  border-radius:999px;padding:5px 11px;font-size:12px;font-weight:600;color:var(--text-2);transition:all .18s}
.legend button .sw{width:9px;height:9px;border-radius:3px}
.legend button[aria-pressed="false"]{opacity:0.4}
.legend button:hover{color:var(--text);border-color:var(--text-4)}
.plot{flex:1;min-height:178px;position:relative;margin-top:6px}
.plot svg{width:100%;height:100%;display:block;overflow:visible}

/* ---------- sectional mocks ---------- */
.smocks{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.smock{padding:20px;display:flex;flex-direction:column;gap:16px;transition:border-color .2s,transform .2s}
.smock:hover{border-color:var(--text-4);transform:translateY(-2px)}
.smock .sm-top{display:flex;align-items:center;gap:10px}
.smock .bar{width:3px;height:34px;border-radius:3px}
.smock .sm-nm{font-weight:700;font-size:16px}
.smock .sm-sub{color:var(--text-3);font-size:11.5px}
.smock .rowx{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-2)}
.smock .rowx b{font-family:var(--f-mono);color:var(--text);font-weight:500}
.spark{height:40px}
.spark svg{width:100%;height:100%;display:block;overflow:visible}
.start{margin-top:2px;display:flex;align-items:center;justify-content:space-between;
  border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 14px;background:rgba(255,255,255,0.012);
  color:var(--text);font-size:13px;font-weight:600;transition:all .2s}
.start:hover{border-color:var(--brand);background:rgba(236,217,166,0.05)}
.start .arr{transition:transform .2s}
.start:hover .arr{transform:translateX(3px)}
.analyze{margin-top:8px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 14px;background:transparent;
  color:var(--text-2);font-size:12.5px;font-weight:600;transition:all .2s}
.analyze:hover{border-color:var(--dilr);color:var(--dilr);background:rgba(86,182,174,0.05)}
.analyze svg{width:15px;height:15px}

/* ---------- full mocks ---------- */
.full-top{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.meter{flex:1;min-width:200px;height:6px;border-radius:99px;background:var(--panel-3);overflow:hidden}
.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),#caa86a);border-radius:99px}
.full-top .lab{font-family:var(--f-mono);font-size:12px;color:var(--text-2);white-space:nowrap}
.full-top .lab b{color:var(--text)}

.mockscroll{display:grid;grid-auto-flow:column;grid-auto-columns:128px;gap:10px;overflow-x:auto;
  padding:4px 2px 16px;scrollbar-width:thin;scroll-snap-type:x proximity}
.mockscroll::-webkit-scrollbar{height:8px}
.mockscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
.mchip{scroll-snap-align:start;border:1px solid var(--line);border-radius:var(--r-sm);
  background:linear-gradient(180deg,var(--panel),var(--ink-2));padding:14px 14px 13px;
  display:flex;flex-direction:column;gap:9px;min-height:118px;transition:border-color .2s,transform .2s}
.mchip:hover{border-color:var(--text-4);transform:translateY(-2px)}
.mchip.live{border-color:rgba(236,217,166,0.45);box-shadow:0 0 0 1px rgba(236,217,166,0.12) inset}
.mchip .code{font-family:var(--f-mono);font-size:13px;font-weight:500;letter-spacing:0.6px}
.mchip .st{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-2);margin-top:auto}
.mchip .sd{width:7px;height:7px;border-radius:50%;flex:none}
.mchip .score{font-family:var(--f-display);font-weight:360;font-size:30px;line-height:1;letter-spacing:-0.5px}
.mchip .score small{font-family:var(--f-mono);font-size:11px;color:var(--text-3);font-weight:400;letter-spacing:0}
.mchip.locked{opacity:0.5}
.mchip.locked .code{color:var(--text-3)}

.rail{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.rcell{border:1px solid var(--line);border-radius:var(--r-sm);background:rgba(255,255,255,0.012);
  padding:16px 15px;display:flex;flex-direction:column;gap:8px;text-align:left;color:var(--text);
  transition:border-color .2s,background .2s,transform .2s}
.rcell:hover{border-color:var(--text-4);background:rgba(255,255,255,0.025);transform:translateY(-2px)}
.rcell .ric{width:18px;height:18px;color:var(--brand)}
.rcell.warnic .ric{color:var(--warn)}
.rcell .rt{font-weight:600;font-size:13.5px}
.rcell .rd{color:var(--text-3);font-size:11.5px;line-height:1.35}

footer{border-top:1px solid var(--line-soft);padding:30px 0 48px;color:var(--text-3);font-size:12px}
footer .fin{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}
footer .ft{font-family:var(--f-mono);letter-spacing:0.4px}

/* ---------- gauge card CTA ---------- */
.open-sec{margin-top:14px;display:flex;align-items:center;justify-content:space-between;
  border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px;background:rgba(255,255,255,0.012);
  color:var(--text);font-size:12.5px;font-weight:600;transition:all .2s;width:100%}
.open-sec:hover{border-color:var(--brand);background:rgba(236,217,166,0.05)}
.open-sec .a{transition:transform .2s}
.open-sec:hover .a{transform:translateX(3px)}

/* ---------- section view ---------- */
#sectionView{padding-bottom:10px}
.sv-top{padding:30px 0 8px}
.back{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);
  background:transparent;color:var(--text-2);border-radius:999px;padding:7px 15px 7px 12px;
  font-size:13px;font-weight:600;transition:all .2s;margin-bottom:26px}
.back:hover{color:var(--text);border-color:var(--text-4)}
.back .a{transition:transform .2s}
.back:hover .a{transform:translateX(-3px)}

.sv-hero{display:flex;gap:30px;align-items:center;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(180deg,var(--panel),var(--ink-2));
  padding:26px 28px;position:relative;overflow:hidden}
.sv-hero .gauge{margin:0;flex:none}
.sv-meta{flex:1;min-width:240px}
.sv-meta .sk{font-family:var(--f-mono);font-size:11.5px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3)}
.sv-meta h2{font-family:var(--f-display);font-optical-sizing:auto;font-weight:360;
  font-size:clamp(26px,4vw,38px);margin:8px 0 2px;letter-spacing:-0.4px}
.sv-meta .full{color:var(--text-2);font-size:14px;margin-bottom:16px}
.sv-stats{display:flex;gap:26px;flex-wrap:wrap}
.sv-stat{display:flex;flex-direction:column;gap:2px}
.sv-stat .v{font-family:var(--f-mono);font-size:18px;color:var(--text)}
.sv-stat .k{font-size:11px;color:var(--text-3);letter-spacing:0.4px}
.sv-syll{margin-top:16px;max-width:340px}
.sv-syll .row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-2);margin-bottom:6px}
.sv-syll .row b{font-family:var(--f-mono);color:var(--text)}
.sv-syll .bar{height:5px;border-radius:99px;background:var(--panel-3);overflow:hidden}
.sv-syll .bar i{display:block;height:100%;border-radius:99px}

.clusters{padding:30px 0 10px;display:flex;flex-direction:column;gap:16px}
.cluster{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);overflow:hidden}
.cl-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line-soft)}
.cl-bar{width:3px;height:26px;border-radius:3px;flex:none}
.cl-head .cl-nm{font-weight:700;font-size:15px;letter-spacing:0.2px}
.cl-head .cl-w{font-family:var(--f-mono);font-size:11px;color:var(--text-3);
  border:1px solid var(--line);border-radius:6px;padding:2px 8px}
.cl-head .cl-prog{margin-left:auto;display:flex;align-items:center;gap:10px}
.cl-head .cl-prog .pp{width:90px;height:4px;border-radius:99px;background:var(--panel-3);overflow:hidden}
.cl-head .cl-prog .pp i{display:block;height:100%;border-radius:99px}
.cl-head .cl-prog .pl{font-family:var(--f-mono);font-size:11px;color:var(--text-2)}

.topic{display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(--line-soft);
  transition:background .15s}
.topic:last-child{border-bottom:0}
.topic:hover{background:rgba(255,255,255,0.018)}
.topic .tdot{width:8px;height:8px;border-radius:50%;flex:none}
.topic .tn{font-size:13.5px;font-weight:500;color:var(--text);min-width:0}
.topic .tmeter{width:74px;height:4px;border-radius:99px;background:var(--panel-3);overflow:hidden;flex:none}
.topic .tmeter i{display:block;height:100%;border-radius:99px}
.topic .tstate{font-size:11px;font-family:var(--f-mono);letter-spacing:0.3px;width:84px;flex:none}
.topic .tspace{flex:1}
.topic .tbtns{display:flex;gap:7px;flex:none}
.tbtn{border:1px solid var(--line);background:transparent;color:var(--text-2);border-radius:8px;
  padding:6px 12px;font-size:12px;font-weight:600;transition:all .18s}
.tbtn:hover{color:var(--text);border-color:var(--text-4)}
.tbtn.tl:hover{border-color:var(--brand);color:var(--brand)}
.tbtn.tp:hover{border-color:var(--dilr);color:var(--dilr)}

/* ---------- topic modal ---------- */
.mscrim{position:fixed;inset:0;background:rgba(5,6,9,0.66);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .22s;z-index:80}
.mscrim.on{opacity:1;pointer-events:auto}
.modal{position:fixed;z-index:90;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);
  width:min(540px,92vw);background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r);
  padding:26px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s}
.modal.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.modal .x{position:absolute;top:18px;right:18px;border:1px solid var(--line);background:transparent;
  color:var(--text-2);width:32px;height:32px;border-radius:8px;font-size:16px;line-height:1}
.modal .x:hover{color:var(--text);border-color:var(--text-4)}
.modal .m-tag{font-family:var(--f-mono);font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-3)}
.modal h3{font-family:var(--f-display);font-weight:360;font-size:25px;margin:7px 0 12px;letter-spacing:-0.3px;max-width:90%}
.m-mastery{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text-2);margin-bottom:20px}
.m-mastery .mm{width:130px;height:5px;border-radius:99px;background:var(--panel-3);overflow:hidden}
.m-mastery .mm i{display:block;height:100%;border-radius:99px}
.m-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.m-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:16px;background:var(--panel)}
.m-card .mc-h{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;margin-bottom:8px}
.m-card .mc-h svg{width:17px;height:17px;color:var(--brand)}
.m-card#mPractice .mc-h svg{color:var(--dilr)}
.m-card p{color:var(--text-3);font-size:12px;line-height:1.45;margin:0 0 14px}
.mc-btn{width:100%;border:1px solid var(--line);background:rgba(236,217,166,0.06);color:var(--text);
  border-radius:8px;padding:9px;font-size:12.5px;font-weight:600;display:flex;align-items:center;
  justify-content:center;gap:6px;transition:all .2s}
.mc-btn:hover{border-color:var(--brand);background:rgba(236,217,166,0.1)}
.mc-btn.alt{background:rgba(86,182,174,0.06)}
.mc-btn.alt:hover{border-color:var(--dilr);background:rgba(86,182,174,0.1)}

/* ---------- analysis modal ---------- */
.a-sub{color:var(--text-2);font-size:13px;margin:0 0 18px;max-width:42ch}
.a-list{display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow-y:auto;scrollbar-width:thin}
.a-list::-webkit-scrollbar{width:8px}
.a-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
.aset{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:var(--r-sm);
  padding:13px 15px;background:var(--panel);text-align:left;color:var(--text);transition:all .18s;width:100%}
.aset:hover{border-color:var(--dilr);background:rgba(86,182,174,0.04);transform:translateY(-1px)}
.aset .ac{font-family:var(--f-mono);font-size:13px;font-weight:500;flex:none}
.aset .ad{font-size:11.5px;color:var(--text-3)}
.aset .asp{flex:1}
.aset .asc{font-family:var(--f-display);font-weight:360;font-size:22px;line-height:1;letter-spacing:-0.5px}
.aset .asc small{font-family:var(--f-mono);font-size:10px;color:var(--text-3);letter-spacing:0;font-weight:400}
.aset .ago{color:var(--text-3);transition:transform .18s;flex:none}
.aset:hover .ago{transform:translateX(3px);color:var(--dilr)}

.a-back{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:transparent;
  color:var(--text-2);border-radius:999px;padding:6px 13px 6px 10px;font-size:12px;font-weight:600;
  transition:all .2s;margin-bottom:14px}
.a-back:hover{color:var(--text);border-color:var(--text-4)}
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.a-stat{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 15px;background:var(--panel)}
.a-stat .v{font-family:var(--f-display);font-weight:360;font-size:24px;line-height:1;letter-spacing:-0.5px}

<script>
"use strict";
/* =========================================================================
   Vettalume — adaptive Learning & Practice (Section > Topic > Subtopic)
   ========================================================================= */

/* ---------------- engine (from the adaptive-engine reference) ---------------- */
const SIG = x => 1/(1+Math.exp(-x));
const mult = d => SIG(d-3)+0.5;                       // difficulty multiplier (eq6/8b)
const H = 0.74;                                       // mastery threshold
function performance(seqC, beta=0.8, P0=0.5){let P=P0;for(const C of seqC)P=beta*P+(1-beta)*C;return P;} // eq8a
function diffScore(log){let n=0,den=0;for(const a of log){n+=a.C*mult(a.d);den+=mult(a.d);}return den?n/den:0;} // eq8b
function memStrength(log){                            // eq9/10, simplified: corrects this session are "fresh"
  const corr=log.filter(a=>a.C===1);
  if(!corr.length) return 0;
  // recency: attempts carry a "sessionsAgo"; fresh practice -> ~1
  let s=0; corr.forEach((a,i)=>{ s+=Math.exp(-(a.ago||0)/(10*(i+1))); });
  return s/corr.length;
}
function masteryOf(log){
  if(!log.length) return 0;
  const P=performance(log.map(a=>a.C));
  const D=diffScore(log);
  const M=memStrength(log);
  return 0.40*P+0.30*D+0.30*M;
}
function selectionWeight(log){                        // eq1->2 : mean reward (learning progress)
  if(log.length<2) return 0.2;
  const cs=log.map(a=>a.C*mult(a.d)), L=4; let rs=[];
  for(let k=1;k<=cs.length;k++){
    let seq=cs.slice(0,k); seq = seq.length<L ? Array(L-seq.length).fill(0).concat(seq) : seq.slice(-L);
    const h=L/2; rs.push(seq.slice(h).reduce((a,b)=>a+b,0)/h - seq.slice(0,h).reduce((a,b)=>a+b,0)/h);
  }
  return rs.reduce((a,b)=>a+b,0)/rs.length;
}

/* ---------------- content tree ---------------- */
// helper builders
const S=(id,name,qtype,theory)=>({id,name,qtype,theory});
const T=(id,name,qtype,subs,prereq)=>({id,name,qtype,subs,prereq:prereq||null});

const AVG_THEORY={
  simple:[
    "The <b>average</b> (arithmetic mean) of a set of values is their total divided by how many values there are.",
    "<code>average = (sum of all values) ÷ (number of values)</code>",
    "So for 4, 8, 6 → (4 + 8 + 6) ÷ 3 = 18 ÷ 3 = <b>6</b>. Notice the average always sits between the smallest and largest value."
  ],
  weighted:[
    "When groups of <b>different sizes</b> are combined, each group's average counts in proportion to its size — you cannot just average the two averages.",
    "<code>overall = (n₁·a₁ + n₂·a₂) ÷ (n₁ + n₂)</code>",
    "20 boys averaging 60 and 30 girls averaging 70 → (20·60 + 30·70) ÷ 50 = 3300 ÷ 50 = <b>66</b>, not 65."
  ],
  speed:[
    "<b>Average speed = total distance ÷ total time</b>. It is NOT the average of the two speeds.",
    "For the same distance covered at two speeds, average speed is the harmonic mean: <code>2·s₁·s₂ ÷ (s₁ + s₂)</code>.",
    "Going 60 km/h and returning 40 km/h → 2·60·40 ÷ 100 = 4800 ÷ 100 = <b>48 km/h</b>, not 50."
  ],
  change:[
    "When a value is added to or removed from a group, the <b>total</b> changes, and the average shifts with it.",
    "<code>new total = old average × old count ± value</code>, then divide by the new count.",
    "If the average of 10 people is 30 and the new average becomes 32 when one joins, that person's value = 32·11 − 30·10 = 352 − 300 = <b>52</b>."
  ]
};

const QA_CLUSTERS=[
 {cluster:"Arithmetic", topics:[
   T("averages","Averages","avg",[
     S("avg-simple","Simple Averages","avg-simple",AVG_THEORY.simple),
     S("avg-weighted","Weighted Averages","avg-weighted",AVG_THEORY.weighted),
     S("avg-speed","Average Speed","avg-speed",AVG_THEORY.speed),
     S("avg-change","Change in Average","avg-change",AVG_THEORY.change),
   ]),
   T("percent","Percentages","percent",[
     S("pct-basic","Percentage Basics","percent"),
     S("pct-change","Percentage Change","percent"),
     S("pct-app","Application of Percentages","percent"),
   ]),
   T("ratio","Ratio & Proportion","ratio",[
     S("ratio-basic","Basic Ratios","ratio"),
     S("ratio-prop","Proportion","ratio"),
     S("ratio-part","Partnership & Sharing","ratio"),
   ]),
   T("mixtures","Mixtures & Alligations","mixture",[
     S("mix-two","Two-mixture problems","mixture"),
     S("mix-allig","Alligation rule","mixture"),
   ],["ratio"]),
   T("profit","Profit & Loss","profit",[
     S("pl-basic","Profit, Loss & Markup","profit"),
     S("pl-discount","Discount problems","profit"),
   ]),
   T("tsd","Time, Speed & Distance","speed2",[
     S("tsd-basic","Speed-Time-Distance","speed2"),
     S("tsd-rel","Relative Speed","speed2"),
   ]),
 ]},
 {cluster:"Algebra", topics:[
   T("linear","Linear Equations","linear",[
     S("lin-one","One Variable","linear"),
     S("lin-two","Two Variables","linear"),
   ]),
   T("quad","Quadratic Equations","quad",[
     S("quad-roots","Roots & Factoring","quad"),
     S("quad-nature","Nature of Roots","quad"),
   ],["linear"]),
   T("ineq","Inequalities","numeric",[
     S("ineq-basic","Linear Inequalities","numeric"),
   ]),
 ]},
 {cluster:"Number System", topics:[
   T("divis","Divisibility & Remainders","remainder",[
     S("rem-basic","Remainders","remainder"),
     S("rem-div","Divisibility Rules","remainder"),
   ]),
   T("hcflcm","HCF & LCM","hcflcm",[
     S("hl-basic","HCF & LCM basics","hcflcm"),
   ]),
 ]},
 {cluster:"Modern Maths", topics:[
   T("pnc","Permutation & Combination","pnc",[
     S("pnc-perm","Permutations","pnc"),
     S("pnc-comb","Combinations","pnc"),
   ]),
   T("prob","Probability","prob",[
     S("prob-basic","Basic Probability","prob"),
   ]),
 ]},
];

// compact trees for other sections / exams (concept-question driven)
function conceptCluster(name, items){
  return {cluster:name, topics: items.map(([id,nm,subs])=>T(id,nm,"concept", subs.map((s,i)=>S(id+"-"+i, s, "concept")))) };
}
const VARC_CLUSTERS=[
  conceptCluster("Reading Comprehension",[["rc","Reading Comprehension",["Main idea & purpose","Inference & tone","Structure & detail"]]]),
  conceptCluster("Verbal Ability",[["para","Parajumbles & Summary",["Parajumbles","Para summary","Odd one out"]],["vocab","Vocabulary & Usage",["Vocabulary in context","Word usage"]]]),
];

let EXAM="CAT";
let hidden={};
const PROG={};   // subKey -> {learned,log,sessions,edge,P,D,M,mastery,learnTime,reviseTime}
const THIST={};  // topicKey -> [mastery snapshots]
const subKey=(sec,tid,sid)=>EXAM+"|"+sec+"|"+tid+"|"+sid;
const topKey=(sec,tid)=>EXAM+"|"+sec+"|"+tid;
function subState(sec,tid,sid){
  const k=subKey(sec,tid,sid);
  if(!PROG[k]) PROG[k]={learned:false,log:[],sessions:[],edge:3,mastery:0,learnTime:0,reviseTime:0};
  return PROG[k];
}
function recomputeSub(st){ st.mastery=masteryOf(st.log); }

function sectionTree(sec){ return (TREE[EXAM]||{})[sec]||[]; }
function findTopic(sec,tid){ for(const cl of sectionTree(sec)) for(const t of cl.topics) if(t.id===tid) return {t,cl}; return null; }
function topicMastery(sec,tid){
  const f=findTopic(sec,tid); if(!f) return 0;
  const subs=f.t.subs; let s=0; for(const sub of subs) s+=subState(sec,tid,sub.id).mastery; return s/subs.length;
}
function topicLearnedAll(sec,tid){const f=findTopic(sec,tid);return f.t.subs.every(sub=>subState(sec,tid,sub.id).learned);}
function isLocked(sec,tid){
  const f=findTopic(sec,tid); if(!f||!f.t.prereq) return false;
  return f.t.prereq.some(p=>topicMastery(sec,p)<H);
}
// MAB / ZPD: best topic to do next in a section = highest expected learning gain among unlocked, not-mastered
function recommendedTopic(sec){
  let best=null,bestGain=-1;
  for(const cl of sectionTree(sec)) for(const t of cl.topics){
    if(isLocked(sec,t.id)) continue;
    const m=topicMastery(sec,t.id); if(m>=H) continue;
    // expected gain: room to grow, boosted slightly if already started (momentum)
    const started=t.subs.some(s=>subState(sec,t.id,s.id).learned);
    const gain=(H-m)*(started?1.15:1.0);
    if(gain>bestGain){bestGain=gain;best=t.id;}
  }
  return best;
}
// within a topic, what to do next (ZPD/MAB): revise weakest learned, else learn next unlearned
function topicNextAction(sec,tid){
  const f=findTopic(sec,tid); if(!f) return null;
  const unlearned=f.t.subs.filter(s=>!subState(sec,tid,s.id).learned);
  if(unlearned.length) return {mode:"learn",sub:unlearned[0]};
  // all learned -> pick weakest by mastery (and improvability)
  let weak=null,wm=2;
  for(const s of f.t.subs){const st=subState(sec,tid,s.id); if(st.mastery<wm){wm=st.mastery;weak=s;}}
  return weak && wm<H ? {mode:"revise",sub:weak} : null;
}

const BENCH={1:40,2:55,3:80,4:110,5:150}; // expected seconds by difficulty
const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const fmt=x=>Number.isInteger(x)?String(x):String(Math.round(x*10)/10);
function opts(ans,dists){
  const out=[ans];
  for(const d of dists){if(d>0 && !out.some(v=>Math.abs(v-d)<1e-6)) out.push(d); if(out.length>=4)break;}
  let p=1;
  while(out.length<4){const c=ans+p*(Math.random()<.5?1:-1)*ri(1,4); if(c>0&&!out.some(v=>Math.abs(v-c)<1e-6))out.push(c); p++; if(p>40)break;}
  const arr=out.slice(0,4); shuffle(arr);
  return {options:arr.map(fmt), correct:arr.findIndex(v=>Math.abs(v-ans)<1e-6)};
}
function wrap(stem,ans,dists,sol,d){const o=opts(ans,dists);return {stem,options:o.options,correct:o.correct,sol,d,bench:BENCH[d]};}

const CONCEPTQ=[
  {d:2,stem:"Choose the option that best completes the sentence: “Despite the setback, the team remained ____ about the launch.”",options:["optimistic","pessimistic","indifferent","resentful"],correct:0,sol:"“Despite the setback” signals contrast, so a positive word is needed — optimistic."},
  {d:3,stem:"An author argues that remote work boosts productivity, citing one survey of a single company. Which choice most weakens the argument?",options:["The company is highly profitable","A broad multi-industry study found no productivity change","Employees prefer remote work","The survey had 500 respondents"],correct:1,sol:"A broad contradicting study undermines a conclusion drawn from one company."},

  {d:4,stem:"Select the pair of words that gives the sentence a coherent meaning: “Her argument was ____, relying on facts rather than ____ appeals.”",options:["emotional … logical","rigorous … emotional","vague … factual","biased … personal"],correct:1,sol:"“Facts rather than ___ appeals” needs a contrast: rigorous vs emotional."},

];
function conceptQ(d){const base=CONCEPTQ.filter(q=>Math.abs(q.d-d)<=1);const q=pick(base.length?base:CONCEPTQ);return {stem:q.stem,options:q.options.slice(),correct:q.correct,sol:q.sol,d,bench:BENCH[d]};}

function genQ(qtype,d){
  d=Math.max(1,Math.min(5,Math.round(d)));
  switch(qtype){
    case "avg-simple":{
      const N=d<=2?3:d<=3?4:5, A=ri(15,55), dels=[]; let s=0;
      for(let i=0;i<N-1;i++){const x=ri(-Math.min(A-3,12),12);dels.push(x);s+=x;}
      dels.push(-s); const nums=dels.map(x=>A+x);
      if(nums.some(x=>x<1)) return genQ(qtype,d);
      return wrap(`Find the average of: ${nums.join(", ")}.`, A,
        [Math.round(nums.reduce((a,b)=>a+b,0)), A+1, A-2],
        `Sum = ${nums.join(" + ")} = ${nums.reduce((a,b)=>a+b,0)}. Average = ${nums.reduce((a,b)=>a+b,0)} ÷ ${N} = ${A}.`, d);
    }
    case "avg-weighted":{
      const n1=ri(2,8),n2=ri(2,8),a1=ri(10,45),a2=ri(46,80);
      const ans=Math.round((n1*a1+n2*a2)/(n1+n2)*10)/10;
      return wrap(`A group has ${n1} members averaging ${a1} and ${n2} members averaging ${a2}. Find the overall average.`,
        ans, [Math.round((a1+a2)/2), ans+2, ans-2],
        `Total = ${n1}×${a1} + ${n2}×${a2} = ${n1*a1+n2*a2}. Members = ${n1+n2}. Average = ${n1*a1+n2*a2} ÷ ${n1+n2} = ${ans}.`, d);
    }
    case "avg-speed":{
      let s1=ri(20,60),s2=ri(20,60); if(s1===s2)s2+=10;
      const ans=Math.round(2*s1*s2/(s1+s2)*10)/10;
      return wrap(`A vehicle goes one way at ${s1} km/h and returns the same distance at ${s2} km/h. Find its average speed.`,
        ans, [Math.round((s1+s2)/2), ans+3, ans-3],
        `Equal distances → average speed = 2·s₁·s₂ ÷ (s₁+s₂) = 2·${s1}·${s2} ÷ ${s1+s2} = ${ans} km/h. (Not the plain average ${Math.round((s1+s2)/2)}.)`, d);
    }
    case "avg-change":{
      const n=ri(5,15),A=ri(20,40),inc=ri(1,3),A2=A+inc;
      const ans=A2*(n+1)-A*n;
      return wrap(`The average of ${n} numbers is ${A}. When one more number is added, the average becomes ${A2}. Find the added number.`,
        ans, [A2, A+n*inc, ans-5],
        `Old total = ${A}×${n} = ${A*n}. New total = ${A2}×${n+1} = ${A2*(n+1)}. Added number = ${A2*(n+1)} − ${A*n} = ${ans}.`, d);
    }
    case "percent":{
      if(Math.random()<0.5){const p=ri(2,18)*5,X=ri(4,40)*5,ans=p*X/100;
        return wrap(`What is ${p}% of ${X}?`,ans,[X*p/1000? X*(p/10):0,ans+5,ans-5,p],
          `${p}% of ${X} = ${p}/100 × ${X} = ${ans}.`,d);}
      const X=ri(2,20)*5,Y=ri(5,25)*5,ans=Math.round(X/Y*1000)/10;
      return wrap(`${X} is what percent of ${Y}?`,ans,[Math.round(Y/X*1000)/10,ans+5,ans-5],
        `${X} ÷ ${Y} × 100 = ${ans}%.`,d);
    }
    case "ratio":{
      const a=ri(2,7),b=ri(2,7),sum=a+b,M=sum*ri(8,30),larger=Math.max(a,b);
      const ans=M*larger/sum;
      return wrap(`An amount of ${M} is divided in the ratio ${a} : ${b}. Find the larger share.`,
        ans,[M*Math.min(a,b)/sum, M/2, ans-M/sum],
        `Total parts = ${a}+${b} = ${sum}. Larger share = ${larger}/${sum} × ${M} = ${ans}.`,d);
    }
    case "mixture":{
      const c1=ri(10,40),c2=ri(50,90),q1=ri(2,8),q2=ri(2,8);
      const ans=Math.round((c1*q1+c2*q2)/(q1+q2)*10)/10;
      return wrap(`${q1} litres of ${c1}%-strength solution are mixed with ${q2} litres of ${c2}%-strength solution. Find the resulting strength.`,
        ans,[Math.round((c1+c2)/2),ans+3,ans-3],
        `Total active = ${q1}×${c1}% + ${q2}×${c2}%. Strength = (${c1}×${q1} + ${c2}×${q2}) ÷ ${q1+q2} = ${ans}%.`,d);
    }
    case "profit":{
      const cp=ri(4,40)*10, pct=ri(5,40), sp=Math.round(cp*(1+pct/100));
      if(Math.random()<0.5) return wrap(`An item bought for ₹${cp} is sold for ₹${sp}. Find the profit percent.`,
        Math.round((sp-cp)/cp*1000)/10,[Math.round((sp-cp)/sp*1000)/10, pct+3, pct-3],
        `Profit = ${sp}−${cp} = ${sp-cp}. Profit% = (${sp-cp} ÷ ${cp})×100 = ${Math.round((sp-cp)/cp*1000)/10}%.`,d);
      return wrap(`An item costs ₹${cp} and is sold at a ${pct}% profit. Find the selling price.`,
        sp,[cp+pct, Math.round(cp*(1-pct/100)), sp+10],
        `SP = ${cp} × (1 + ${pct}/100) = ₹${sp}.`,d);
    }
    case "speed2":{
      const s=ri(20,80),t=ri(2,9),ans=s*t;
      if(Math.random()<0.5) return wrap(`A car travels at ${s} km/h for ${t} hours. How far does it go?`,
        ans,[s+t,Math.round(s/t),ans-s],`Distance = speed × time = ${s} × ${t} = ${ans} km.`,d);
      const dd=s*t; return wrap(`A car covers ${dd} km at ${s} km/h. How long does it take?`,
        t,[Math.round(dd/(s+10)*10)/10,t+1,Math.max(1,t-1)],`Time = distance ÷ speed = ${dd} ÷ ${s} = ${t} h.`,d);
    }
    case "linear":{
      const x=ri(2,12),a=ri(2,9),b=ri(1,20),c=a*x+b;
      return wrap(`Solve for x:  ${a}x + ${b} = ${c}.`,x,[x+1,x-1,Math.round(c/a)],
        `${a}x = ${c} − ${b} = ${c-b}. x = ${c-b} ÷ ${a} = ${x}.`,d);
    }
    case "quad":{
      const r1=ri(1,9),r2=ri(1,9),b=-(r1+r2),c=r1*r2;
      return wrap(`One root of  x² ${b<0?"− "+(-b):"+ "+b}x + ${c} = 0  is ${r1}. Find the other root.`,
        r2,[c,Math.abs(b),r2+1],`Product of roots = ${c}, so other root = ${c} ÷ ${r1} = ${r2}. (Sum of roots = ${-b}.)`,d);
    }
    case "remainder":{
      const div=ri(3,9),q=ri(5,20),r=ri(1,div-1),N=div*q+r;
      return wrap(`Find the remainder when ${N} is divided by ${div}.`,r,[r+1,div-r,(r+2)%div||1],
        `${N} = ${div}×${q} + ${r}, so the remainder is ${r}.`,d);
    }
    case "hcflcm":{
      const g=ri(2,9),a=g*ri(2,6),b=g*ri(2,6);
      const gcd=(x,y)=>y?gcd(y,x%y):x; const G=gcd(a,b),Lc=a*b/G;
      if(Math.random()<0.5) return wrap(`Find the HCF of ${a} and ${b}.`,G,[Lc,G+1,Math.min(a,b)],
        `HCF(${a}, ${b}) = ${G}.`,d);
      return wrap(`Find the LCM of ${a} and ${b}.`,Lc,[G,a+b,Lc-G],`LCM(${a}, ${b}) = ${a}×${b} ÷ HCF(${G}) = ${Lc}.`,d);
    }
    case "pnc":{
      const fact=n=>{let f=1;for(let i=2;i<=n;i++)f*=i;return f;};
      const n=ri(4,7),r=ri(2,Math.min(4,n));
      if(Math.random()<0.5){const ans=fact(n)/fact(n-r);
        return wrap(`In how many ways can ${r} people be arranged from a group of ${n}?  (i.e. ⁿPᵣ)`,ans,
          [fact(n)/(fact(r)*fact(n-r)),fact(n),n*r],`ⁿPᵣ = ${n}! ÷ (${n}−${r})! = ${ans}.`,d);}
      const ans=fact(n)/(fact(r)*fact(n-r));
      return wrap(`In how many ways can ${r} people be chosen from ${n}?  (i.e. ⁿCᵣ)`,ans,
        [fact(n)/fact(n-r),n*r,ans+2],`ⁿCᵣ = ${n}! ÷ (${r}! · (${n}−${r})!) = ${ans}.`,d);
    }
    case "prob":{
      const tot=ri(6,12),fav=ri(1,tot-1);const g=((x,y)=>{const gg=(a,b)=>b?gg(b,a%b):a;return gg(x,y);})(fav,tot);
      const ans=Math.round(fav/tot*100)/100;
      return wrap(`A bag has ${tot} balls, ${fav} of them red. What is the probability of drawing a red ball? (as a decimal)`,
        ans,[Math.round((tot-fav)/tot*100)/100,ans+0.1,Math.max(0.01,ans-0.1)],
        `P = favourable ÷ total = ${fav}/${tot} = ${ans}.`,d);
    }
    case "numeric": default:{
      const a=ri(6,30),b=ri(2,12),ans=a*b;
      return wrap(`Evaluate:  ${a} × ${b}.`,ans,[a+b,a*b-a,ans+b],`${a} × ${b} = ${ans}.`,d);
    }
    case "concept": return conceptQ(d);
  }
}

function gaugeSVG(value,color,id){
  const r=66,cx=79,cy=79,vis=75,fill=vis*(value/100),fid="g_"+id;
  return `<svg viewBox="0 0 158 158" aria-hidden="true"><defs>
    <filter id="${fid}" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1B202A" stroke-width="9" pathLength="100" stroke-dasharray="${vis} ${100-vis}" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="9" pathLength="100" stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(135 ${cx} ${cy})" filter="url(#${fid})" style="transition:stroke-dasharray 1s cubic-bezier(.4,0,.2,1)" data-fill="${fill}"/></svg>`;
}
function lineSVG(series,color,opt){
  opt=opt||{}; const w=320,h=140,L=8,R=10,T=12,B=20,n=series.length;
  const ymin=opt.ymin!==undefined?opt.ymin:Math.min(...series), ymax=opt.ymax!==undefined?opt.ymax:Math.max(...series),rng=(ymax-ymin)||1;
  const X=i=>L+i/(Math.max(1,n-1))*(w-L-R), Y=v=>T+(1-(v-ymin)/rng)*(h-T-B);
  const dline=series.map((v,i)=>(i?"L":"M")+X(i).toFixed(1)+" "+Y(v).toFixed(1)).join(" ");
  const area=dline+` L ${X(n-1).toFixed(1)} ${h-B} L ${X(0).toFixed(1)} ${h-B} Z`;
  let tg="";
  if(opt.target!==undefined){const ty=Y(opt.target);tg=`<line x1="${L}" y1="${ty.toFixed(1)}" x2="${w-R}" y2="${ty.toFixed(1)}" stroke="#A36A1F" stroke-dasharray="3 3"/><text x="${w-R}" y="${(ty-4).toFixed(1)}" text-anchor="end" font-family="'JetBrains Mono'" font-size="8" fill="#C89A55">${opt.tlabel||"target"}</text>`;}
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="lg${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.16"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#lg${color.replace('#','')})"/>${tg}<path d="${dline}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(n-1).toFixed(1)}" cy="${Y(series[n-1]).toFixed(1)}" r="3" fill="#090B0F" stroke="${color}" stroke-width="2"/></svg>`;
}
function diffBarsSVG(rows,color){ // rows: [{lab, pct}]
  const w=320,h=22*rows.length+8; let g="";
  rows.forEach((r,i)=>{const y=i*22+6;
    g+=`<text x="0" y="${y+11}" font-family="'JetBrains Mono'" font-size="11" fill="#9BA1AD">${r.lab}</text>`;
    g+=`<rect x="60" y="${y+3}" width="200" height="7" rx="3.5" fill="#1B202A"/>`;
    g+=`<rect x="60" y="${y+3}" width="${(r.pct/100*200).toFixed(1)}" height="7" rx="3.5" fill="${r.pct>=60?color:r.pct>=40?'#E0A84E':'#A8542B'}"/>`;
    g+=`<text x="268" y="${y+11}" font-family="'JetBrains Mono'" font-size="11" fill="#F3F0E9">${r.pct}%</text>`;});
  return `<svg viewBox="0 0 ${w} ${h}">${g}</svg>`;
}
const COLcat=()=>({VARC:"#E0A84E",DILR:"#56B6AE",QA:"#A18FE0",Quant:"#A18FE0",Verbal:"#E0A84E","Data Insights":"#56B6AE",Writing:"#56B6AE"});
function secColor(key){return COLcat()[key]||"#ECD9A6";}
function masteryLabel(m){const v=m*100;if(v>=78)return["Mastered","#69B88C"];if(v>=55)return["On track","#ECD9A6"];if(v>=28)return["Needs work","#D08A52"];return["Not started","#666C77"];}
function tint(c,a){const map={"#E0A84E":"224,168,78","#56B6AE":"86,182,174","#A18FE0":"161,143,224"};return `rgba(${map[c]||"236,217,166"},${a})`;}
const esc=s=>String(s).replace(/"/g,"&quot;");
const fmtT=s=>{s=Math.round(s);return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");};

function buildLegend(ex){const lg=document.getElementById("legend");if(!lg)return;lg.innerHTML="";

    b.addEventListener("click",()=>{hidden[s.key]=!hidden[s.key];b.setAttribute("aria-pressed",hidden[s.key]?"false":"true");drawPlot(ex);});
    lg.appendChild(b);});}
function drawPlot(ex){const p=document.getElementById("plot");if(!p)return;
  const w=560,h=210,L=34,R=14,T=14,B=26,iw=w-L-R,ih=h-T-B,xmax=WEEKS.length-1,ymin=20,ymax=100;
  const X=i=>L+i/xmax*iw,Y=v=>T+(1-(v-ymin)/(ymax-ymin))*ih; let g="",defs="";
  [40,60,80,100].forEach(v=>{g+=`<line x1="${L}" y1="${Y(v).toFixed(1)}" x2="${w-R}" y2="${Y(v).toFixed(1)}" stroke="#1C212B"/><text x="${L-8}" y="${(Y(v)+3.5).toFixed(1)}" text-anchor="end" font-size="9" font-family="'JetBrains Mono'" fill="#454B55">${v}</text>`;});
  WEEKS.forEach((wk,i)=>{g+=`<text x="${X(i).toFixed(1)}" y="${h-8}" text-anchor="middle" font-size="8.5" font-family="'JetBrains Mono'" fill="#454B55">${wk}</text>`;});
  ex.sections.forEach((s,si)=>{if(hidden[s.key])return;const pts=s.series.map((v,i)=>[X(i),Y(v)]);
    const dl=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
    defs+=`<linearGradient id="ar${si}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${s.c}" stop-opacity="0.16"/><stop offset="1" stop-color="${s.c}" stop-opacity="0"/></linearGradient>`;
    g+=`<path d="${dl} L ${X(xmax).toFixed(1)} ${T+ih} L ${X(0).toFixed(1)} ${T+ih} Z" fill="url(#ar${si})"/><path d="${dl}" fill="none" stroke="${s.c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    const lp=pts[pts.length-1];g+=`<circle cx="${lp[0].toFixed(1)}" cy="${lp[1].toFixed(1)}" r="3.4" fill="#090B0F" stroke="${s.c}" stroke-width="2"/>`;});
  p.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet"><defs>${defs}</defs>${g}</svg>`;}

/* ---------------- TOPIC (dashboard + subtopic list) ---------------- */
function aggregateTopic(sec,tid){
  const f=findTopic(sec,tid); let log=[],learnT=0,revT=0;
  const subs=f.t.subs.map(sub=>{const st=subState(sec,tid,sub.id);log=log.concat(st.log);learnT+=st.learnTime;revT+=st.reviseTime;return {sub,st};});
  const byD={}; [1,2,3,4,5].forEach(d=>byD[d]={t:0,c:0});
  log.forEach(a=>{const d=Math.max(1,Math.min(5,a.d));byD[d].t++;byD[d].c+=a.C;});
  return {subs,log,learnT,revT,byD,total:log.length};
}
function viewTopic(sec,tid){
  const f=findTopic(sec,tid); const c=secColor(sec); const m=topicMastery(sec,tid),lab=masteryLabel(m);
  const ag=aggregateTopic(sec,tid);
  const sortedByMast=[...ag.subs].sort((a,b)=>b.st.mastery-a.st.mastery);
  const learnedSubs=ag.subs.filter(x=>x.st.learned);
  const strongest=sortedByMast.filter(x=>x.st.learned).slice(0,2);
  const weakest=[...learnedSubs].sort((a,b)=>a.st.mastery-b.st.mastery).slice(0,2);
  // difficulty rows
  const accRows=[1,2,3,4,5].map(d=>({lab:"d"+d,pct:ag.byD[d].t?Math.round(ag.byD[d].c/ag.byD[d].t*100):0})).filter(r=>r.pct>0||ag.byD[parseInt(r.lab.slice(1))].t>0);
  const accRowsShown = accRows.length?accRows:[{lab:"d2",pct:0},{lab:"d3",pct:0},{lab:"d4",pct:0}];
  // history line
  const hist=THIST[topKey(sec,tid)]||[];
  const histSeries=hist.length>1?hist:[0,m];
  // time split
  const tot=ag.learnT+ag.revT, lp=tot?Math.round(ag.learnT/tot*100):50;
  // common mistakes
  const mistakes=[];
  const hardAcc=ag.byD[4].t+ag.byD[5].t? Math.round((ag.byD[4].c+ag.byD[5].c)/(ag.byD[4].t+ag.byD[5].t)*100):null;
  if(hardAcc!==null&&hardAcc<55) mistakes.push(["warn","Hard questions (d4–d5) are where most errors cluster — accuracy there is "+hardAcc+"%."]);
  if(weakest[0]) mistakes.push(["warn",weakest[0].sub.name+" is your weakest subtopic, dragging the topic mastery down."]);
  if(strongest[0]) mistakes.push(["good","Your "+strongest[0].sub.name+" concept is strong ("+Math.round(strongest[0].st.mastery*100)+"%)."]);
  if(!mistakes.length) mistakes.push(["good","Start a subtopic below — analytics fill in as you answer questions."]);
  // recommended action
  const na=topicNextAction(sec,tid);
  let recAct="";
  if(na&&na.mode==="learn") recAct=`Learn <b>${na.sub.name}</b> next — it is the next concept in your path.`;
  else if(na&&na.mode==="revise") recAct=`Revise <b>${na.sub.name}</b> — it is your weakest area in this topic.`;
  else recAct=`All subtopics are strong. ${(()=>{const nt=recommendedTopic(sec);const ff=nt&&findTopic(sec,nt);return ff?"Move on to <b>"+ff.t.name+"</b>.":"You are ready to move to the next topic."})()}`;
  if(hardAcc!==null&&hardAcc<55) recAct+=" Focus on hard-level practice before moving ahead.";

  // subtopic list
  let subRows="";
  const next=topicNextAction(sec,tid);
  f.t.subs.forEach(sub=>{
    const st=subState(sec,tid,sub.id),sl=masteryLabel(st.mastery);
    const isNext=next&&next.sub.id===sub.id;
    const learnBtn=`<button class="tbtn tl" data-go="theory" data-sec="${sec}" data-tid="${tid}" data-sid="${sub.id}">${st.learned?'Re-learn':'Learn'}</button>`;
    const revBtn=`<button class="tbtn tr ${st.learned?'':'disabled'}" ${st.learned?`data-revise="1" data-sec="${sec}" data-tid="${tid}" data-sid="${sub.id}"`:'disabled'}>Revise</button>`;
    const anaBtn=st.learned?`<button class="tbtn" data-go="subanalysis" data-sec="${sec}" data-tid="${tid}" data-sid="${sub.id}">Analysis</button>`:'';
    subRows+=`<div class="sub-row"><span class="sdot" style="background:${st.learned?sl[1]:'#454B55'}"></span>
      <span class="sn">${sub.name}</span>${isNext?'<span class="badge next">ZPD next</span>':st.learned&&st.mastery>=H?'<span class="badge done">Mastered</span>':''}
      <span class="ssp"></span>
      <span class="smeter"><i style="width:${Math.round(st.mastery*100)}%;background:${sl[1]}"></i></span>
      <span class="sstate" style="color:${st.learned?sl[1]:'#666C77'}">${st.learned?sl[0]:'Not started'}</span>
      <span class="sb">${learnBtn}${revBtn}${anaBtn}</span></div>`;
  });

  return `<div class="wrap pg"><button class="back" data-go="section" data-sec="${sec}"><span class="a">←</span> All ${sec} topics</button>
    <div class="sk">${EXAM} · ${sec} · topic dashboard</div><h2>${f.t.name}</h2>
    <div class="full">An overall read on this topic, then its subtopics. Each subtopic has a first-time <b style="color:${c}">Learn</b> flow and an adaptive <b style="color:var(--qa)">Revise</b> flow.</div></div>
  <div class="wrap" style="padding-bottom:8px">
    <div class="bigstat">
      <div class="bs"><div class="v" style="color:${c}">${ag.total}</div><div class="k">questions attempted</div></div>
      <div class="bs"><div class="v">${ag.total?Math.round(ag.log.filter(a=>a.C).length/ag.total*100):0}<small>%</small></div><div class="k">overall accuracy</div></div>
      <div class="bs"><div class="v" style="color:${lab[1]}">${m.toFixed(2)}</div><div class="k">topic mastery</div></div>
      <div class="bs"><div class="v">${learnedSubs.length}<small>/${f.t.subs.length}</small></div><div class="k">subtopics learned</div></div>
    </div>
    <div class="dash-grid">
      <div class="dbox"><h4>Accuracy by difficulty</h4>${diffBarsSVG(accRowsShown,c)}</div>
      <div class="dbox"><h4>Improvement over time</h4><div class="plot">${lineSVG(histSeries,c,{ymin:0,ymax:1,target:H,tlabel:"mastery "+H})}</div></div>
      <div class="dbox"><h4>Strongest subtopics</h4><div class="swlist">${strongest.length?strongest.map(x=>`<div class="swrow"><span class="sd" style="background:#69B88C"></span><span class="nm">${x.sub.name}</span><span class="mv">${Math.round(x.st.mastery*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">Learn a subtopic to see this.</div>'}</div></div>
      <div class="dbox"><h4>Weakest subtopics</h4><div class="swlist">${weakest.length?weakest.map(x=>`<div class="swrow"><span class="sd" style="background:#D08A52"></span><span class="nm">${x.sub.name}</span><span class="mv">${Math.round(x.st.mastery*100)}%</span></div>`).join(''):'<div style="color:var(--text-3);font-size:12.5px">Learn a subtopic to see this.</div>'}</div></div>
      <div class="dbox"><h4>Time: learning vs practising</h4>
        <div class="splitbar" style="margin-top:4px"><div class="splitseg" style="width:${lp}%;background:${c}"></div><div class="splitseg" style="width:${100-lp}%;background:var(--qa)"></div></div>
        <div class="splitkey"><span><i class="sw" style="background:${c}"></i> Learn <b>${fmtT(ag.learnT)}</b></span><span><i class="sw" style="background:var(--qa)"></i> Practice <b>${fmtT(ag.revT)}</b></span></div></div>

    </div>

/* ---------------- THEORY (start of Learn) ---------------- */

/* ---------------- LEARN / REVISE session ---------------- */
function startLearnSim(sec,tid,sid){
  const f=findTopic(sec,tid),sub=f.t.subs.find(s=>s.id===sid);
  const diffs=shuffle([2,2,3,3,3,4,4,4,5,5]);
  const qs=diffs.map(d=>genQ(sub.qtype,d));
  SESS={mode:"learn",sec,tid,sid,sub,qs,idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined};
  go({v:"quiz"});
}
function startReviseSim(sec,tid,sid){
  const f=findTopic(sec,tid),sub=f.t.subs.find(s=>s.id===sid),st=subState(sec,tid,sid);
  SESS={mode:"revise",sec,tid,sid,sub,qs:[genQ(sub.qtype,st.edge)],idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined,startMast:st.mastery};
  go({v:"revise"});
}
function viewQuiz(){
  const S=SESS,q=S.qs[S.idx],n=S.target||S.qs.length;
  let title="",back;
  if(S.mode==="smock"){title=`${S.sec} Mock ${S.n} · ${SMOCK_MIN} min`;back=`data-quitsess="1" data-go="smArea" data-sec="${S.sec}"`;}
  else if(S.mode==="fmock"){title=`Full Mock ${S.n} · ${allSections().length} sections`;back=`data-quitsess="1" data-go="fmArea"`;}
  else if(S.mode==="practice"){const f=findTopic(S.sec,S.tid);title=`${f.t.name} · Practice test`;back=`data-quitsess="1" data-go="topic" data-sec="${S.sec}" data-tid="${S.tid}"`;}
  else {back=`data-quitsess="1" data-go="topic" data-sec="${S.sec}" data-tid="${S.tid}"`;}
  const allot=S.allot?` / ${fmtT(S.allot)}`:"";
  return `<div class="wrap pg"><button class="back" ${back}><span class="a">←</span> Quit</button>
    <div class="qwrap">
      ${title?`<div class="sk">${title}</div>`:""}
      <div class="qbar" style="margin-top:10px"><span class="qprog">Question ${S.idx+1} / ${n}</span><div class="qtrack"><i style="width:${(S.idx)/n*100}%"></i></div>
        <span class="timer"><span class="pls"></span><span id="timer">0:00</span>${allot}</span></div>
      ${qCard(q,S)}
    </div></div>`;
}
function viewRevise(){
  const S=SESS,q=S.qs[S.idx],st=subState(S.sec,S.tid,S.sid),lab=masteryLabel(st.mastery);
  const delta=st.mastery-S.startMast;
  return `<div class="wrap pg"><button class="back" data-quitsess="1" data-finrev="1" data-go="topic" data-sec="${S.sec}" data-tid="${S.tid}"><span class="a">←</span> End session</button>
    <div class="qwrap">
      <div class="sk">${S.sub.name} · Revise (adaptive)</div>
      <div class="live-mast" style="margin-top:10px">Mastery <span class="mm"><i style="width:${Math.round(st.mastery*100)}%;background:${lab[1]}"></i></span>
        <b style="color:${lab[1]}">${st.mastery.toFixed(2)}</b> <span class="delta" style="color:${delta>=0?'#69B88C':'#D08A52'}">${delta>=0?'+':''}${delta.toFixed(2)}</span>
        <span style="margin-left:auto" class="timer"><span class="pls"></span><span id="timer">0:00</span></span></div>
      <div class="qbar"><span class="qprog">Practised ${S.ans.length} · difficulty adapts to you</span><div class="qtrack"><i style="width:${Math.min(100,st.mastery*100)}%"></i></div></div>
      ${qCard(q,S)}
    </div></div>`;
}
function qCard(q,S){
  if(S.loading||!q) return '<div class="qcard"><div class="qstem" style="color:var(--text-2)">Loading question from the engine…</div></div>';
  const letters=["A","B","C","D"];
  const reveal=(S.mode==="learn"||S.mode==="revise");
  const test=(S.mode==="smock"||S.mode==="fmock"||S.mode==="practice");
  const tag=test&&q.topic?`<span class="dchip" style="border-color:rgba(236,217,166,.4)">${q.section?q.section+' · ':''}${q.topic}</span>`:"";
  let optsHtml="";
  q.options.forEach((o,i)=>{
    let cls="opt";
    if(S.answered){ if(reveal){ if(i===q.correct)cls+=" correct"; else if(i===S.selected)cls+=" wrong"; else cls+=" dim"; }
      else { if(i===S.selected)cls+=" picked"; else cls+=" dim"; } }
    optsHtml+=`<button class="${cls}" ${S.answered?'disabled':`data-opt="${i}"`}><span class="k">${letters[i]}</span><span>${o}</span></button>`;
  });
  const last=S.idx+1>=(S.target||S.qs.length);
  const lastLabel=(S.mode==="smock"||S.mode==="fmock")?"See results":S.mode==="practice"?"See analysis":"See review";
  let fb="";
  if(S.answered){
    if(reveal){const ok=S.selected===q.correct;
      fb=`<div class="fb ${ok?'ok':'no'}"><div class="fh">${ok?'Correct':'Not quite'}</div><div class="sol">${q.sol}</div></div>
        <div class="qfoot"><button class="nextbtn" data-next="1">${last?lastLabel:'Next question'} <span>→</span></button></div>`;}
    else fb=`<div class="fb" style="background:var(--panel);border:1px solid var(--line)"><div class="sol" style="color:var(--text-2)">Answer recorded.</div></div>
        <div class="qfoot"><button class="nextbtn" data-next="1">${last?lastLabel:'Next question'} <span>→</span></button></div>`;
  }
  const skip=(!S.answered&&test)?`<div class="qfoot"><button class="nextbtn" style="border-color:var(--line);background:transparent;color:var(--text-2)" data-skip="1">Skip question →</button></div>`:"";
  return `<div class="qcard"><div class="qmeta"><span class="dchip">difficulty ${q.d}</span><span>target ~${q.bench}s</span>${tag}</div>
    <div class="qstem">${q.stem}</div>${optsHtml}${fb}${skip}</div>`;
}
function answerQSim(i){
  if(SESS.answered) return;
  SESS.selected=i; SESS.answered=true;
  const q=SESS.qs[SESS.idx], t=(Date.now()-SESS.qStart)/1000;
  SESS.ans.push({q,chosen:i,correct:i===q.correct,d:q.d,time:t,bench:q.bench});
  // live mastery update for revise
  const st=subState(SESS.sec,SESS.tid,SESS.sid);
  if(SESS.mode==="revise"){
    st.log.push({C:i===q.correct?1:0,d:q.d,ago:0}); recomputeSub(st); st.reviseTime+=t;
    // MAPLE: move edge
    st.edge = i===q.correct ? Math.min(5,st.edge+0.4) : Math.max(1,st.edge-0.4);
  }
  render();
}
function nextQSim(){
  if(SESS.mode==="revise"){
    const st=subState(SESS.sec,SESS.tid,SESS.sid);
    SESS.qs.push(genQ(SESS.sub.qtype,st.edge)); SESS.idx++; SESS.selected=null; SESS.answered=false; SESS.qStart=Date.now(); render(); return;
  }
  if(SESS.idx+1>=SESS.qs.length){ finalizeFixed(); return; }
  SESS.idx++; SESS.selected=null; SESS.answered=false; SESS.qStart=Date.now(); render();
}
function skipQ(){
  if(SESS.answered) return;
  const q=SESS.qs[SESS.idx], t=(Date.now()-SESS.qStart)/1000;
  SESS.ans.push({q,chosen:-1,correct:false,d:q.d,time:t,bench:q.bench,skipped:true});
  if(SESS.idx+1>=SESS.qs.length){ finalizeFixed(); return; }
  SESS.idx++; SESS.selected=null; SESS.answered=false; SESS.qStart=Date.now(); render();
}
function finalizeLearn(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  const S=SESS, st=subState(S.sec,S.tid,S.sid);
  const totalTime=S.ans.reduce((a,b)=>a+b.time,0);
  if(!S.backend){ S.ans.forEach(a=>st.log.push({C:a.correct?1:0,d:a.d,ago:0})); recomputeSub(st); }
  st.learned=true; st.learnTime+=totalTime;
  st.sessions.push({when:Date.now(),ans:S.ans,acc:S.ans.length?S.ans.filter(a=>a.correct).length/S.ans.length:0,avg:S.ans.length?totalTime/S.ans.length:0});
  // topic mastery history snapshot
  const tk=topKey(S.sec,S.tid); if(!THIST[tk])THIST[tk]=[0]; THIST[tk].push(topicMastery(S.sec,S.tid));
  go({v:"subanalysis",sec:S.sec,tid:S.tid,sid:S.sid});
}
function finishRevise(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  if(SESS){const tk=topKey(SESS.sec,SESS.tid); if(!THIST[tk])THIST[tk]=[0]; THIST[tk].push(topicMastery(SESS.sec,SESS.tid));}
  SESS=null;
}

/* ---------------- SUBTOPIC ANALYSIS ---------------- */
function viewSubAnalysis(sec,tid,sid){
  const f=findTopic(sec,tid),sub=f.t.subs.find(s=>s.id===sid),st=subState(sec,tid,sid),c=secColor(sec);
  const ses=st.sessions[st.sessions.length-1];
  if(!ses) return `<div class="wrap pg"><button class="back" data-go="topic" data-sec="${sec}" data-tid="${tid}"><span class="a">←</span> ${f.t.name}</button><h2>${sub.name}</h2><p class="full">No Learn session yet — run Learn to generate this analysis.</p></div>`;
  const ans=ses.ans, acc=Math.round(ses.acc*100), avg=ses.avg, bench=ans.reduce((a,b)=>a+b.bench,0), actual=ans.reduce((a,b)=>a+b.time,0);
  // missed by difficulty
  const byD={}; [2,3,4,5].forEach(d=>byD[d]={t:0,c:0});
  ans.forEach(a=>{if(!byD[a.d])byD[a.d]={t:0,c:0};byD[a.d].t++;byD[a.d].c+=a.correct?1:0;});
  const diffRows=Object.keys(byD).filter(d=>byD[d].t).map(d=>({lab:"d"+d,pct:Math.round(byD[d].c/byD[d].t*100)}));
  // recommendations
  const recs=[];
  const hardT=ans.filter(a=>a.d>=4), hardCorrect=hardT.filter(a=>a.correct).length;
  const slowHard=hardT.filter(a=>a.time>a.bench).length;
  if(slowHard>=2) recs.push(["warn","You spent more time than expected on hard questions — pace work at d4–d5 will help."]);
  if(hardT.length&&hardCorrect/hardT.length<0.5) recs.push(["warn",`Hard questions are your gap (${hardCorrect}/${hardT.length} correct). Practise ${Math.max(8,hardT.length*3)} more hard-level questions before moving ahead.`]);
  const easyT=ans.filter(a=>a.d<=2),easyWrong=easyT.filter(a=>!a.correct).length;
  if(easyWrong>=2) recs.push(["warn","A few easy questions slipped — these are careless errors worth tightening up."]);
  if(st.mastery>=H) recs.push(["good","Mastery is above threshold — you can move to the next subtopic, with light revision to keep it sharp."]);
  else recs.push(["good",`Mastery is ${st.mastery.toFixed(2)}. A Revise session targeting your weak difficulties will push it past ${H}.`]);
  // concepts needing improvement (by difficulty band)
  const weakBand = diffRows.filter(r=>r.pct<55).map(r=>r.lab).join(", ");
  return `<div class="wrap pg"><button class="back" data-go="topic" data-sec="${sec}" data-tid="${tid}"><span class="a">←</span> ${f.t.name}</button>
    <div class="sk">${sec} · ${f.t.name} · subtopic analysis</div><h2>${sub.name}</h2>
    <div class="full">Your most recent Learn session. This stays available whenever you revisit the subtopic.</div></div>
  <div class="wrap" style="padding-bottom:8px">
    <div class="bigstat">
      <div class="bs"><div class="v" style="color:${c}">${acc}<small>%</small></div><div class="k">accuracy (${ans.filter(a=>a.correct).length}/${ans.length})</div></div>
      <div class="bs"><div class="v">${fmtT(avg)}</div><div class="k">avg time / question</div></div>
      <div class="bs"><div class="v" style="color:${actual<=bench?'#69B88C':'#D08A52'}">${actual<=bench?'−':'+'}${fmtT(Math.abs(actual-bench))}</div><div class="k">vs ${fmtT(bench)} benchmark</div></div>
      <div class="bs"><div class="v" style="color:${masteryLabel(st.mastery)[1]}">${st.mastery.toFixed(2)}</div><div class="k">mastery now</div></div>
    </div>
    <div class="dash-grid">
      <div class="dbox"><h4>Accuracy by difficulty (missed where it dips)</h4>${diffBarsSVG(diffRows,c)}
        ${weakBand?`<div style="font-size:12px;color:var(--warn);margin-top:8px">Weak at: ${weakBand}</div>`:''}</div>
      <div class="dbox"><h4>Concepts requiring improvement</h4><div class="rec-list">
        ${diffRows.filter(r=>r.pct<55).length?diffRows.filter(r=>r.pct<55).map(r=>`<div class="rec warn"><span class="ri">!</span><span>${r.lab} questions: only ${r.pct}% correct — revisit the harder applications of ${sub.name.toLowerCase()}.</span></div>`).join(''):'<div class="rec good"><span class="ri">✓</span><span>No difficulty band is weak — solid across the board.</span></div>'}
      </div></div>
    </div>
    <div class="dbox full" style="margin-bottom:14px"><h4>Recommendations</h4><div class="rec-list">${recs.map(([t,x])=>`<div class="rec ${t}"><span class="ri">${t==='good'?'✓':'→'}</span><span>${x}</span></div>`).join('')}</div></div>

    <div class="head" style="margin:8px 0 12px"><div><div class="idx"><span class="ln"></span>Review your answers</div></div></div>
    ${ans.map((a,i)=>`<div class="rev-q" data-rev="${i}"><div class="rev-h">
      <span class="rev-mark ${a.correct?'ok':'no'}">${a.correct?'✓':'✗'}</span>
      <span class="rstem">Q${i+1}. ${a.q.stem}</span>
      <span class="rt">${fmtT(a.time)} ${a.time>a.bench?'· slow':''}</span><span class="chev">›</span></div>
      <div class="rev-body"><div class="ln">Your answer: <b>${a.q.options[a.chosen]}</b>${a.correct?'':` · Correct: <b style="color:#69B88C">${a.q.options[a.q.correct]}</b>`}</div>
      <div class="ln">Difficulty <b>d${a.d}</b> · your time <b>${fmtT(a.time)}</b> vs target <b>${fmtT(a.bench)}</b></div>
      <div class="sol">${a.q.sol}</div></div></div>`).join('')}
    <div style="margin-top:18px;display:flex;gap:10px"><button class="bigbtn teal" data-revise="1" data-sec="${sec}" data-tid="${tid}" data-sid="${sid}">Revise this subtopic <span class="a">→</span></button>
      <button class="bigbtn" data-go="topic" data-sec="${sec}" data-tid="${tid}">Back to topic <span class="a">→</span></button></div>
  </div>`;
}

/* ===================== BACKEND BRIDGE — live API integration ===================== */
const API={base:"",token:null,ready:false,built:{}};
async function apiReq(method,path,opt){opt=opt||{};
  let url=API.base+path;const q=opt.q;
  if(q){const ps=Object.entries(q).filter(([,v])=>v!=null&&v!=="").map(([k,v])=>encodeURIComponent(k)+"="+encodeURIComponent(v));if(ps.length)url+="?"+ps.join("&");}
  const o={method,headers:{}};if(opt.auth!==false&&API.token)o.headers.Authorization="Bearer "+API.token;
  if(opt.body!=null){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(opt.body);}
  const r=await fetch(url,o);let d=null;try{d=await r.json();}catch(e){}
  if(!r.ok)throw Object.assign(new Error("HTTP "+r.status),{status:r.status,data:d});return d;}
const apiGet=(p,q)=>apiReq("GET",p,{q});
const apiPost=(p,body,q)=>apiReq("POST",p,{body,q});

function setBanner(txt,bad){let b=document.getElementById("liveBanner");
  if(!b){b=document.createElement("div");b.id="liveBanner";
    b.style.cssText="position:fixed;left:0;right:0;bottom:0;z-index:99;font:12px/1.5 var(--f-mono,ui-monospace,monospace);padding:7px 14px;text-align:center;letter-spacing:.02em";
    document.body.appendChild(b);}
  b.textContent=txt;b.style.background=bad?"#34191a":"#15241b";b.style.color=bad?"#E2A2A2":"#8fd0a8";}

async function bootAuth(){try{const r=await apiReq("POST","/auth/dev-login",{body:{email:"dashboard@vettalume.test",exam_code:EXAM},auth:false});
  API.token=r.access_token;API.ready=true;return true;}catch(e){API.ready=false;return false;}}

const SECCOLORS=["#A18FE0","#E0A84E","#56B6AE","#69B88C","#D08A52"];
async function ensureExam(exam){
  if(API.built[exam])return true;
  if(!API.ready){if(!await bootAuth()){setBanner("⚠ Backend offline — showing the design only. Start uvicorn on this origin for live data.",true);return false;}}
  let tree,nodes;
  try{tree=await apiGet("/catalog/tree",{exam});const st=await apiGet("/practice/state",{exam});nodes=st.nodes||[];}
  catch(e){setBanner("⚠ Could not load "+exam+" ("+(e.status||"net")+").",true);return false;}
  const M={};nodes.forEach(n=>M[n.node_id]={mastery:n.mastery,learned:n.learned,attempts:n.attempts});
  const topicsOf=k=>(tree.topics||[]).filter(t=>t.section===k);
  const secs=(tree.sections||[]).map((sx,i)=>{
    const cs=topicsOf(sx.key).reduce((a,t)=>a.concat(t.concepts),[]);
    const ms=cs.map(c=>M[c.id]?M[c.id].mastery:0);
    const ability=ms.length?Math.round(ms.reduce((a,b)=>a+b,0)/ms.length*100):0;
    const learned=cs.filter(c=>M[c.id]&&M[c.id].learned).length;
    return {key:sx.key,full:sx.name,c:SECCOLORS[i%SECCOLORS.length],ability,
      syll:cs.length?Math.round(learned/cs.length*100):0,delta:"+0",
      series:Array.from({length:8},(_,k)=>Math.max(0,Math.round(ability-(7-k)*ability/8))),
      attempted:learned,total:cs.length,bestSc:"—",lastSc:"—"};});
  EXAMS[exam]={diag:"● Live · connected to your engine ("+exam+")",
    hero:"This is your real backend. Open a section, pick a topic, and answer questions — every question, grade and mastery comes from the engine, not a simulation.",
    done:0,best:"—",sections:secs};
  const tmap={};(tree.sections||[]).forEach(sx=>{
    tmap[sx.key]=[{name:sx.name,topics:topicsOf(sx.key).map(t=>({id:t.id,name:t.name,prereq:[],
      subs:t.concepts.map(c=>({id:c.id,name:c.name,qtype:"backend"}))}))}];});
  TREE[exam]=tmap;
  (tree.sections||[]).forEach(sx=>topicsOf(sx.key).forEach(t=>t.concepts.forEach(c=>{
    const k=exam+"|"+sx.key+"|"+t.id+"|"+c.id;const m=M[c.id];
    PROG[k]={learned:m?m.learned:false,log:[],sessions:[],edge:3,mastery:m?m.mastery:0,learnTime:0,reviseTime:0};})));
  API.built[exam]=true;setBanner("● Live — connected to backend · "+exam+" · answers graded by the engine",false);return true;}

async function fetchQ(nodeId){try{const it=await apiGet("/practice/next",{node_id:nodeId});
  return {id:it.item_id,stem:it.stem,options:it.options||[],correct:null,sol:null,d:0,bench:90,node:nodeId};}
  catch(e){return null;}}

/* ---- live session implementations ---- */
async function startLearnBackend(sec,tid,sid){
  const f=findTopic(sec,tid),sub=f.t.subs.find(s=>s.id===sid);
  SESS={mode:"learn",sec,tid,sid,sub,qs:[],idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined,target:10,backend:true,loading:true};
  go({v:"quiz"});const q=await fetchQ(sid);
  if(!q){SESS=null;alert("No questions for “"+sub.name+"” in the bank yet. Ingest items for this concept, then retry.");go({v:"topic",sec,tid});return;}
  SESS.qs=[q];SESS.loading=false;SESS.qStart=Date.now();render();}
async function startReviseBackend(sec,tid,sid){
  const f=findTopic(sec,tid),sub=f.t.subs.find(s=>s.id===sid),st=subState(sec,tid,sid);
  SESS={mode:"revise",sec,tid,sid,sub,qs:[],idx:0,ans:[],selected:null,answered:false,qStart:Date.now(),t0:undefined,startMast:st.mastery,backend:true,loading:true};
  go({v:"revise"});const q=await fetchQ(sid);
  if(!q){SESS=null;alert("No more unseen questions for “"+sub.name+"”.");go({v:"topic",sec,tid});return;}
  SESS.qs=[q];SESS.loading=false;SESS.qStart=Date.now();render();}
async function answerQBackend(i){
  if(!SESS||SESS.answered||SESS.grading||SESS.loading)return;
  const q=SESS.qs[SESS.idx];if(!q)return;SESS.selected=i;const t=(Date.now()-SESS.qStart)/1000;
  SESS.grading=true;render();
  try{const res=await apiPost("/practice/answer",{item_id:q.id,answer_given:(q.options[i]!=null?String(q.options[i]):null),context:"practice",response_time_ms:Math.round(t*1000)});
    q.correct=res.correct?i:-1;q.sol=res.solution||"(no written solution for this item)";
    SESS.grading=false;SESS.answered=true;
    SESS.ans.push({q,chosen:i,correct:!!res.correct,d:q.d,time:t,bench:q.bench});
    const st=subState(SESS.sec,SESS.tid,SESS.sid);st.log.push({C:res.correct?1:0,d:q.d,ago:0});
    if(typeof res.mastery==="number")st.mastery=res.mastery;st.learned=true;
    if(SESS.mode==="revise")st.reviseTime+=t;else st.learnTime+=t;}
  catch(e){SESS.grading=false;SESS.answered=true;q.correct=-1;
    q.sol="⚠ Couldn’t reach the backend to grade this ("+(e.status||"network")+"). Is the server running on this origin?";
    SESS.ans.push({q,chosen:i,correct:false,d:q.d,time:t,bench:q.bench});}
  render();}
async function nextQBackend(){
  if(!SESS)return;
  if(SESS.mode==="learn"&&SESS.ans.length>=(SESS.target||10)){finalizeFixed();return;}
  SESS.loading=true;SESS.answered=false;SESS.selected=null;render();
  const q=await fetchQ(SESS.sid);
  if(!q){if(SESS.mode==="learn"){finalizeFixed();}else{const sec=SESS.sec,tid=SESS.tid;finishRevise();go({v:"topic",sec,tid});}return;}
  SESS.qs.push(q);SESS.idx++;SESS.loading=false;SESS.qStart=Date.now();render();}

/* ---- dispatchers: live when connected, simulation otherwise ---- */
function startLearn(sec,tid,sid){return API.built[EXAM]?startLearnBackend(sec,tid,sid):startLearnSim(sec,tid,sid);}
function startRevise(sec,tid,sid){return API.built[EXAM]?startReviseBackend(sec,tid,sid):startReviseSim(sec,tid,sid);}
function answerQ(i){return (SESS&&SESS.backend)?answerQBackend(i):answerQSim(i);}
function nextQ(){return (SESS&&SESS.backend)?nextQBackend():nextQSim();}


document.addEventListener("click",e=>{
  const rev=e.target.closest("[data-rev]"); if(rev){rev.classList.toggle("open");return;}
  const opt=e.target.closest("[data-opt]"); if(opt){answerQ(parseInt(opt.dataset.opt,10));return;}
  const nx=e.target.closest("[data-next]"); if(nx){nextQ();return;}
  const sl=e.target.closest("[data-startlearn]"); if(sl){startLearn(sl.dataset.sec,sl.dataset.tid,sl.dataset.sid);return;}
  const rv=e.target.closest("[data-revise]"); if(rv){startRevise(rv.dataset.sec,rv.dataset.tid,rv.dataset.sid);return;}
