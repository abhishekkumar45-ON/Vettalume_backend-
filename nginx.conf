# Load balancer in front of the app replicas. nginx terminates client connections and spreads
# requests across however many 'app' containers are running. Because the app is stateless (identity
# is in the JWT), no sticky sessions are needed — any replica can serve any request.
worker_processes auto;
events { worker_connections 4096; }

http {
    # Docker's embedded DNS. Re-resolving the 'app' service name returns all running replicas and
    # round-robins across them, so scaling with `docker compose up --scale app=N` just works.
    resolver 127.0.0.11 valid=10s ipv6=off;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 25m;          # allow question-bank .xlsx uploads through the proxy

    # basic per-IP rate limit at the edge (defence in depth; app-level limiting comes later)
    limit_req_zone $binary_remote_addr zone=perip:10m rate=20r/s;

    server {
        listen 80;

        location / {
            limit_req zone=perip burst=40 nodelay;
            set $backend app;                 # variable -> nginx re-resolves per request (picks up replicas)
            proxy_pass http://$backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }
    }
}
