services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vettalume
      POSTGRES_PASSWORD: vettalume
      POSTGRES_DB: vettalume
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vettalume"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7
    ports: ["6379:6379"]
  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://vettalume:vettalume@db:5432/vettalume
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
